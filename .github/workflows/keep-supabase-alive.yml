name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */4 * *'  # ogni 4 giorni alle 08:00
  workflow_dispatch:        # eseguibile manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://cfejkhmrphjiccyrkblc.supabase.co/rest/v1/fuel_entries?select=id&limit=1" \
            -o /dev/null -w "HTTP %{http_code}\n"
