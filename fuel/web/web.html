const loadK = async (k) => {
  try {
    if (k === 'ft-adblue-v1') { const r = localStorage.getItem(k); return r ? JSON.parse(r) : []; }
    const table = k === 'ft-v3' ? 'fuel_entries' : 'maintenance_entries';
    const { data, error } = await sb.from(table).select('*').order('date', { ascending: true });
    if (error) throw error;
    if (k === 'ft-v3') {
      return data.map(r => ({ id: r.id, date: r.date, liters: Number(r.liters), pricePerLiter: Number(r.price_per_liter), odometer: r.odometer, totalCost: Number(r.total_cost), fuelType: r.fuel_type, fullTank: r.full_tank, notes: r.notes || '' }));
    } else {
      return data.map(r => ({ id: r.id, date: r.date, type: r.type, desc: r.description, cost: Number(r.cost), odometer: r.odometer || 0, notes: r.notes || '' }));
    }
  } catch(e) {
    console.warn('Supabase load fallback:', e.message);
    try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : []; } catch { return []; }
  }
};

const saveK = async (k, v) => {
  try {
    if (k === 'ft-adblue-v1') { localStorage.setItem(k, JSON.stringify(v)); return; }
    const table = k === 'ft-v3' ? 'fuel_entries' : 'maintenance_entries';
    const rows = k === 'ft-v3'
      ? v.map(e => ({ id: e.id, date: e.date, liters: e.liters, price_per_liter: e.pricePerLiter, odometer: e.odometer, total_cost: e.totalCost, fuel_type: e.fuelType, full_tank: e.fullTank, notes: e.notes || '' }))
      : v.map(e => ({ id: e.id, date: e.date, type: e.type, description: e.desc, cost: e.cost, odometer: e.odometer || 0, notes: e.notes || '' }));
    if (rows.length > 0) {
      const { error } = await sb.from(table).upsert(rows, { onConflict: 'id' });
      if (error) throw error;
      const ids = v.map(e => e.id);
      await sb.from(table).delete().not('id', 'in', `(${ids.map(i => `"${i}"`).join(',')})`);
    } else {
      await sb.from(table).delete().neq('id', '___none___');
    }
    localStorage.setItem(k, JSON.stringify(v));
  } catch(e) {
    console.warn('Supabase save fallback:', e.message);
    try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
  }
};

// Fuelio CSV parser
const parseFuelioCSV = (text) => {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean); let logStart = -1;
  for (let i = 0; i < lines.length; i++) { if (lines[i].replace(/"/g,"").trim()==="## Log") { logStart=i; break; } }
  if (logStart===-1) return null;
  const pL = (line) => { const r=[]; let c="",q=false; for(let i=0;i<line.length;i++){const ch=line[i]; if(ch==='"')q=!q; else if(ch===','&&!q){r.push(c.trim());c="";}else c+=ch;} r.push(c.trim()); return r; };
  const h=pL(lines[logStart+1]).map(x=>x.toLowerCase()); const entries=[];
  const iD=h.findIndex(x=>x.includes("data")),iO=h.findIndex(x=>x.includes("odo")),iF=h.findIndex(x=>x.includes("fuel")&&!x.includes("type")),
    iFl=h.findIndex(x=>x.includes("full")),iP=h.findIndex(x=>x.includes("price")&&!x.includes("volume")),iN=h.findIndex(x=>x.includes("notes")),iVP=h.findIndex(x=>x.includes("volumeprice"));
  if(iD===-1||iO===-1||iF===-1) return null;
  let logEnd=lines.length; for(let i=logStart+2;i<lines.length;i++){if(lines[i].replace(/"/g,"").trim().startsWith("##")){logEnd=i;break;}}
  for(let i=logStart+2;i<logEnd;i++){const cols=pL(lines[i]); if(cols.length<3)continue;
    const date=cols[iD],odo=parseFloat(cols[iO]),lit=parseFloat(cols[iF]),full=iFl>=0?cols[iFl]==="1":true,notes=iN>=0?(cols[iN]||""):"";
    if(!date||isNaN(odo)||isNaN(lit)||lit<=0)continue; let ppl=0;
    if(iVP>=0&&cols[iVP]){const vp=parseFloat(cols[iVP]);if(!isNaN(vp)&&vp>0&&vp<10)ppl=vp;}
    if(ppl===0&&iP>=0&&cols[iP]){const tp=parseFloat(cols[iP]);if(!isNaN(tp)&&tp>0)ppl=tp>lit*5?tp/lit:tp<5?tp:tp/lit;}
    entries.push({id:genId(),date:date.slice(0,10),odometer:Math.round(odo),liters:Math.round(lit*1000)/1000,pricePerLiter:Math.round(ppl*1000)/1000,totalCost:Math.round(lit*ppl*100)/100,fullTank:full,fuelType:detectFuel(notes),notes});
  } return entries.length>0?entries:null;
};

// ═══ CETANE CALCULATOR ═══
const CetaneCalc = ({tankComp}) => {
  const [targetCetane, setTargetCetane] = React.useState("60");
  const CAP = 71;
  const space = CAP - tankComp.total;
  const target = parseFloat(targetCetane);
  const currentCetane = tankComp.cetane;
  const results = React.useMemo(() => {
    if (!target || target < 40 || target > 80 || tankComp.total <= 0) return null;
    const calc = (fuelCetane, name) => {
      if (Math.abs(fuelCetane - currentCetane) < 0.01) return { name, liters: 0, possible: true, note: "Cetano già al target" };
      const needed = tankComp.total * (target - currentCetane) / (fuelCetane - currentCetane);
      if (needed < 0) return { name, liters: 0, possible: false, note: fuelCetane > currentCetane ? "Serve abbassare" : "Serve alzare" };
      return { name, liters: Math.min(needed, space), possible: needed <= space, full: needed, note: needed > space ? `Servirebbero ${fmtN(needed,1)}L (spazio: ${fmtN(space,1)}L)` : null };
    };
    return [calc(CETANE.HVO, "HVO"), calc(CETANE["Diesel+"], "Diesel+"), calc(CETANE.B7, "B7")];
  }, [target, tankComp, currentCetane, space]);
  return (
    <ChartCard title="Calcolatore Cetano" icon={Target} color="#00c88a">
      <div style={{marginBottom:14}}>
        <div style={{fontSize:12,color:"rgba(0,200,140,0.8)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",fontWeight:600,marginBottom:6}}>CETANO DESIDERATO</div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <input type="range" min="45" max="75" step="0.5" value={targetCetane} onChange={e=>setTargetCetane(e.target.value)} style={{flex:1,accentColor:"#00c88a"}}/>
          <input type="number" min="40" max="80" step="0.5" value={targetCetane} onChange={e=>setTargetCetane(e.target.value)} style={{width:70,padding:"6px 10px",background:"rgba(0,200,140,0.06)",border:"1px solid rgba(0,200,140,0.2)",borderRadius:6,color:"#00c88a",fontSize:16,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",outline:"none"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:11,color:"rgba(255,255,255,0.5)",fontFamily:"'JetBrains Mono',monospace"}}><span>45</span><span>Cetano attuale: {fmtN(currentCetane,1)}</span><span>75</span></div>
      </div>
      {results && (
        <div style={{display:"grid",gap:8}}>
          {results.map(r => (
            <div key={r.name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:`rgba(${r.name==="HVO"?"0,212,255":r.name==="Diesel+"?"255,140,0":"240,192,0"},0.03)`,borderRadius:8,border:`1px solid rgba(${r.name==="HVO"?"0,212,255":r.name==="Diesel+"?"255,140,0":"240,192,0"},0.08)`}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:3,height:28,borderRadius:2,background:FC[r.name]}}/>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:FC[r.name],fontFamily:"'JetBrains Mono',monospace"}}>{r.name}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",fontFamily:"'JetBrains Mono',monospace",marginTop:1}}>Cetano: {CETANE[r.name]}</div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                {r.possible && r.liters > 0 ? (
                  <><div style={{fontSize:18,fontWeight:700,color:"#fff",fontFamily:"'JetBrains Mono',monospace"}}>{fmtN(r.liters,1)} L</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",fontFamily:"'JetBrains Mono',monospace"}}>da aggiungere</div></>
                ) : r.liters === 0 && r.possible ? (
                  <div style={{fontSize:10,color:"rgba(0,200,140,0.5)",fontFamily:"'JetBrains Mono',monospace"}}>{r.note}</div>
                ) : !r.possible && r.full ? (
                  <><div style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.4)",fontFamily:"'JetBrains Mono',monospace"}}>{fmtN(Math.min(r.full,space),1)} L</div>
                  <div style={{fontSize:11,color:"rgba(255,80,80,0.5)",fontFamily:"'JetBrains Mono',monospace"}}>{r.note}</div></>
                ) : (
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace"}}>{r.note}</div>
                )}
              </div>
            </div>
          ))}
          <div style={{textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.5)",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>Spazio disponibile: {fmtN(space,1)} L</div>
        </div>
      )}
    </ChartCard>
  );
};

// ═══ AXIS STYLE ═══
const AX = {tick:{fill:"rgba(255,255,255,0.55)",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}};
const GRID = <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,100,200,0.06)"/>;

// ═══ MAIN APP ═══
function App() {
  const [entries, setEntries] = useState([]);
  const [maint, setMaint] = useState([]);
  const [view, setView] = useState("dash");
  const [loading, setLoading] = useState(true);
  const [editId, setEditId] = useState(null);
  const [editMaintId, setEditMaintId] = useState(null);
  const [msg, setMsg] = useState(null);
  const [form, setForm] = useState({ date: new Date().toISOString().slice(0,10), liters:"", price:"", odo:"", fuel:"HVO", full:true, notes:"" });
  const [mForm, setMForm] = useState({ date: new Date().toISOString().slice(0,10), type:"Tagliando", desc:"", cost:"", odo:"", notes:"" });
  const [adblue, setAdblue] = useState([]);
  const [abForm, setAbForm] = useState({ date: new Date().toISOString().slice(0,10), liters:"", cost:"", odo:"", notes:"" });
  const [editAbId, setEditAbId] = useState(null);
  const [infoTab, setInfoTab] = useState("veicolo");

  useEffect(() => { Promise.all([loadK("ft-v3"), loadK("ft-maint-v3"), loadK("ft-adblue-v1")]).then(([f,m,a]) => { setEntries(f); setMaint(m); setAdblue(a); setLoading(false); }); }, []);
  const showMsg = (ok, text) => { setMsg({ ok, text }); setTimeout(() => setMsg(null), 4000); };

  // ═══ CALCULATIONS ═══
  const sorted = useMemo(() => [...entries].sort((a,b) => a.odometer - b.odometer), [entries]);
  const enriched = useMemo(() => sorted.map((e,i) => ({ ...e, calc: e.fullTank ? calcCons(e, i>0 ? sorted[i-1] : null) : null })), [sorted]);
  const withCalc = useMemo(() => enriched.filter(e => e.calc), [enriched]);

  const stats = useMemo(() => ({
    n: entries.length, liters: entries.reduce((s,e) => s+e.liters, 0), cost: entries.reduce((s,e) => s+e.totalCost, 0),
    km: withCalc.reduce((s,e) => s+e.calc.kmDriven, 0), avgL: withCalc.length ? withCalc.reduce((s,e) => s+e.calc.lPer100, 0)/withCalc.length : null,
    avgC: withCalc.length ? withCalc.reduce((s,e) => s+e.calc.costPerKm, 0)/withCalc.length : null,
    minL: withCalc.length ? Math.min(...withCalc.map(e=>e.calc.lPer100)) : null,
    maxL: withCalc.length ? Math.max(...withCalc.map(e=>e.calc.lPer100)) : null,
    minC: withCalc.length ? Math.min(...withCalc.map(e=>e.calc.costPerKm)) : null,
    maxC: withCalc.length ? Math.max(...withCalc.map(e=>e.calc.costPerKm)) : null,
    avgLiters: entries.length ? entries.reduce((s,e)=>s+e.liters,0)/entries.length : null,
    avgPrice: entries.length ? entries.reduce((s,e)=>s+e.pricePerLiter,0)/entries.length : null,
    avgDist: withCalc.length ? withCalc.reduce((s,e)=>s+e.calc.kmDriven,0)/withCalc.length : null,
  }), [entries, withCalc]);

  const byFuel = useMemo(() => FUEL_TYPES.map(ft => {
    const f=withCalc.filter(e=>e.fuelType===ft), all=entries.filter(e=>e.fuelType===ft);
    return { type:ft, count:all.length, avgL:f.length?f.reduce((s,e)=>s+e.calc.lPer100,0)/f.length:null, avgC:f.length?f.reduce((s,e)=>s+e.calc.costPerKm,0)/f.length:null, liters:all.reduce((s,e)=>s+e.liters,0), cost:all.reduce((s,e)=>s+e.totalCost,0), minL:f.length?Math.min(...f.map(e=>e.calc.lPer100)):null, maxL:f.length?Math.max(...f.map(e=>e.calc.lPer100)):null };
  }).filter(s => s.count > 0), [entries, withCalc]);

  const totalMaintCost = useMemo(() => maint.reduce((s,m) => s + m.cost, 0), [maint]);

  // Tank composition — simulate fill/consume cycle
  const tankComp = useMemo(() => {
    const CAP = 71;
    const tank = { B7:0, HVO:0, "Diesel+":0, Mix:0 };
    const avgCons = stats.avgL || 7;
    const getTot = () => tank.B7 + tank.HVO + tank["Diesel+"] + tank.Mix;
    const scale = (r) => { tank.B7 *= r; tank.HVO *= r; tank["Diesel+"] *= r; tank.Mix *= r; };
    for (let i = 0; i < sorted.length; i++) {
      const e = sorted[i];
      if (i > 0) {
        const km = e.odometer - sorted[i-1].odometer;
        if (e.fullTank) {
          const remaining = Math.max(0, CAP - e.liters);
          const tot = getTot();
          if (tot > 0) scale(remaining / tot); else { tank.B7=0; tank.HVO=0; tank["Diesel+"]=0; tank.Mix=0; }
        } else {
          const consumed = km * avgCons / 100;
          const tot = getTot();
          if (tot > 0) scale(Math.max(0, tot - consumed) / tot);
        }
      }
      tank[e.fuelType] = (tank[e.fuelType] || 0) + e.liters;
      const tot = getTot();
      if (tot > CAP) scale(CAP / tot);
    }
    const tot = getTot();
    const cetane = tot > 0 ? (tank.B7 * CETANE.B7 + tank.HVO * CETANE.HVO + tank["Diesel+"] * CETANE["Diesel+"] + tank.Mix * CETANE.Mix) / tot : 0;
    return { B7: tank.B7, HVO: tank.HVO, "Diesel+": tank["Diesel+"], Mix: tank.Mix, total: tot, cetane,
      pctB7: tot>0?tank.B7/tot*100:0, pctHVO: tot>0?tank.HVO/tot*100:0, "pctDiesel+": tot>0?tank["Diesel+"]/tot*100:0, pctMix: tot>0?tank.Mix/tot*100:0 };
  }, [sorted, stats.avgL]);

  // Chart data
  const chartData = useMemo(() => withCalc.map(e => ({ date:fmtDate(e.date), dateFull:e.date, "l/100km":+e.calc.lPer100.toFixed(2), "€/km":+e.calc.costPerKm.toFixed(3), km:e.calc.kmDriven, liters:e.liters, cost:e.totalCost, fuel:e.fuelType })), [withCalc]);

  // Rolling average (5-point)
  const rollingAvg = useMemo(() => {
    const w=5; return chartData.map((d,i) => {
      const slice = chartData.slice(Math.max(0,i-w+1),i+1);
      return {...d, avg:+(slice.reduce((s,x)=>s+x["l/100km"],0)/slice.length).toFixed(2)};
    });
  }, [chartData]);

  // Monthly
  const monthlyData = useMemo(() => {
    const m = {};
    entries.forEach(e => { const k = e.date.slice(0,7); if(!m[k]) m[k]={month:k,liters:0,cost:0,count:0,types:{}}; m[k].liters+=e.liters; m[k].cost+=e.totalCost; m[k].count++; m[k].types[e.fuelType]=(m[k].types[e.fuelType]||0)+e.liters; });
    withCalc.forEach(e => { const k = e.date.slice(0,7); if(m[k]){if(!m[k].km)m[k].km=0;if(!m[k].totL)m[k].totL=0; m[k].km+=e.calc.kmDriven; m[k].totL+=e.liters;} });
    return Object.values(m).sort((a,b)=>a.month.localeCompare(b.month)).map(x=>({
      ...x, label: new Date(x.month+"-15").toLocaleDateString("it-IT",{month:"short",year:"2-digit"}),
      "l/100km": x.km>0?+(x.totL/x.km*100).toFixed(2):null,
      "€/km": x.km>0?+(x.cost/x.km).toFixed(3):null,
      "€/L": x.liters>0?+(x.cost/x.liters).toFixed(3):null,
      B7:x.types["B7"]||0, HVO:x.types["HVO"]||0, Mix:x.types["Mix"]||0,
    }));
  }, [entries, withCalc]);

  // Price trend
  const priceData = useMemo(() => [...entries].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(e=>({date:fmtDate(e.date),"€/L":+e.pricePerLiter.toFixed(3),fuel:e.fuelType})), [entries]);

  // Cumulative
  const cumulative = useMemo(() => {
    let totCost=0, totLiters=0, totKm=0;
    return [...entries].sort((a,b)=>new Date(a.date)-new Date(b.date)).map((e,i) => {
      totCost+=e.totalCost; totLiters+=e.liters;
      const wc = withCalc.find(w=>w.id===e.id);
      if(wc) totKm+=wc.calc.kmDriven;
      return {date:fmtDate(e.date),"€ Totali":+totCost.toFixed(0),"Litri Totali":+totLiters.toFixed(0),"Km Totali":totKm};
    });
  }, [entries, withCalc]);

  // Day of week analysis
  const dowData = useMemo(() => {
    const days = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
    const d = Array(7).fill(null).map(()=>({count:0,totL:0}));
    withCalc.forEach(e => { const dow = new Date(e.date).getDay(); d[dow].count++; d[dow].totL+=e.calc.lPer100; });
    return days.map((name,i) => ({name, "l/100km":d[i].count>0?+(d[i].totL/d[i].count).toFixed(2):0, count:d[i].count}));
  }, [withCalc]);

  // Distance between fills
  const distData = useMemo(() => withCalc.map(e => ({date:fmtDate(e.date),km:e.calc.kmDriven,fuel:e.fuelType})), [withCalc]);

  // Fill size distribution
  const fillSizes = useMemo(() => {
    const buckets = [0,20,30,40,50,60,71];
    const counts = Array(buckets.length-1).fill(0);
    entries.forEach(e => { for(let i=0;i<buckets.length-1;i++){if(e.liters>=buckets[i]&&e.liters<buckets[i+1]){counts[i]++;break;}} });
    return buckets.slice(0,-1).map((b,i) => ({range:`${b}-${buckets[i+1]}L`,count:counts[i]}));
  }, [entries]);

  // Maintenance by type
  const maintByType = useMemo(() => {
    const m = {};
    maint.forEach(e => { if(!m[e.type]) m[e.type]={type:e.type,cost:0,count:0}; m[e.type].cost+=e.cost; m[e.type].count++; });
    return Object.values(m).sort((a,b)=>b.cost-a.cost);
  }, [maint]);

  // Cost breakdown
  const costBreakdown = useMemo(() => [
    {name:"Carburante",value:+stats.cost.toFixed(0),color:"#0099ff"},
    {name:"Manutenzione",value:+totalMaintCost.toFixed(0),color:"#ffa832"},
    {name:"Assicurazione",value:1086,color:"#c080ff"}
  ].filter(x=>x.value>0), [stats.cost, totalMaintCost]);
  const totalOwnership = costBreakdown.reduce((s,x)=>s+x.value,0);

  // Efficiency scatter (km driven vs l/100km)
  const scatterData = useMemo(() => withCalc.map(e=>({km:e.calc.kmDriven,"l/100km":+e.calc.lPer100.toFixed(2),fuel:e.fuelType,date:fmtDate(e.date)})), [withCalc]);

  // ═══ HANDLERS ═══
  const handleSubmit = async () => {
    const liters=parseFloat(form.liters),price=parseFloat(form.price),odo=parseInt(form.odo); if(!liters||!price||!odo) return;
    const entry = { id:editId||genId(), date:form.date, liters, pricePerLiter:price, odometer:odo, totalCost:Math.round(liters*price*100)/100, fuelType:form.fuel, fullTank:form.full, notes:form.notes };
    const u = editId ? entries.map(e=>e.id===editId?entry:e) : [...entries,entry]; setEntries(u); await saveK("ft-v3",u);
    setForm({date:new Date().toISOString().slice(0,10),liters:"",price:"",odo:"",fuel:"HVO",full:true,notes:""}); setEditId(null); setView("dash"); showMsg(true,"Rifornimento salvato");
  };
  const handleMaintSubmit = async () => {
    const cost=parseFloat(mForm.cost),odo=mForm.odo?parseInt(mForm.odo):0; if(!mForm.desc||isNaN(cost)) return;
    const entry = { id:editMaintId||genId(), date:mForm.date, type:mForm.type, desc:mForm.desc, cost, odometer:odo, notes:mForm.notes };
    const u = editMaintId ? maint.map(m=>m.id===editMaintId?entry:m) : [...maint,entry]; setMaint(u); await saveK("ft-maint-v3",u);
    setMForm({date:new Date().toISOString().slice(0,10),type:"Tagliando",desc:"",cost:"",odo:"",notes:""}); setEditMaintId(null); showMsg(true,"Spesa registrata");
  };
  const handleDelete = async (id) => { const u=entries.filter(e=>e.id!==id); setEntries(u); await saveK("ft-v3",u); };
  const handleDeleteMaint = async (id) => { const u=maint.filter(m=>m.id!==id); setMaint(u); await saveK("ft-maint-v3",u); };
  const handleEdit = (e) => { setForm({date:e.date,liters:""+e.liters,price:""+e.pricePerLiter,odo:""+e.odometer,fuel:e.fuelType,full:e.fullTank,notes:e.notes||""}); setEditId(e.id); setView("add"); };
  const handleEditMaint = (m) => { setMForm({date:m.date,type:m.type,desc:m.desc,cost:""+m.cost,odo:m.odometer?""+m.odometer:"",notes:m.notes||""}); setEditMaintId(m.id); setView("maint"); };
  // AdBlue handlers
  const handleAbSubmit = async () => {
    const liters=parseFloat(abForm.liters),cost=parseFloat(abForm.cost)||0,odo=parseInt(abForm.odo); if(!liters||!odo) return;
    const entry = { id:editAbId||genId(), date:abForm.date, liters, cost, odometer:odo, notes:abForm.notes||"" };
    const u = editAbId ? adblue.map(a=>a.id===editAbId?entry:a) : [...adblue,entry]; setAdblue(u); await saveK("ft-adblue-v1",u);
    setAbForm({date:new Date().toISOString().slice(0,10),liters:"",cost:"",odo:"",notes:""}); setEditAbId(null); showMsg(true,"AdBlue registrato");
  };
  const handleAbDelete = async (id) => { const u=adblue.filter(a=>a.id!==id); setAdblue(u); await saveK("ft-adblue-v1",u); };
  const handleAbEdit = (a) => { setAbForm({date:a.date,liters:""+a.liters,cost:a.cost?""+a.cost:"",odo:""+a.odometer,notes:a.notes||""}); setEditAbId(a.id); setView("adblue"); };

  // AdBlue stats
  const abSorted = useMemo(() => [...adblue].sort((a,b) => a.odometer - b.odometer), [adblue]);
  const abStats = useMemo(() => {
    if (abSorted.length < 2) return null;
    const totalL = abSorted.reduce((s,a)=>s+a.liters,0);
    const totalCost = abSorted.reduce((s,a)=>s+(a.cost||0),0);
    const kmSpan = abSorted[abSorted.length-1].odometer - abSorted[0].odometer;
    const lPer1000 = kmSpan > 0 ? (totalL / kmSpan) * 1000 : null;
    const avgInterval = kmSpan / (abSorted.length - 1);
    const lastOdo = abSorted[abSorted.length-1].odometer;
    const currentOdo = entries.length ? Math.max(...entries.map(e=>e.odometer)) : lastOdo;
    const kmSinceLast = currentOdo - lastOdo;
    const estNextKm = avgInterval > 0 ? Math.round(lastOdo + avgInterval) : null;
    return { totalL, totalCost, kmSpan, lPer1000, avgInterval: Math.round(avgInterval), lastOdo, kmSinceLast, estNextKm, count: abSorted.length };
  }, [abSorted, entries]);

  const handleReset = async () => { if(confirm("Cancellare TUTTI i dati?")){setEntries([]);setMaint([]);setAdblue([]);await saveK("ft-v3",[]);await saveK("ft-maint-v3",[]);await saveK("ft-adblue-v1",[]);} };
  const handleImportJSON = async (e) => { const file=e.target.files?.[0]; if(!file)return; try{const data=JSON.parse(await file.text()); const imp=data.entries||data;
    if(!Array.isArray(imp)||!imp.length){showMsg(false,"File non valido");return;} const keys=new Set(entries.map(e=>`${e.date}-${e.odometer}`));
    const added=imp.filter(e=>e.date&&e.odometer&&!keys.has(`${e.date}-${e.odometer}`)).map(e=>({...e,id:e.id||genId(),totalCost:e.totalCost||e.liters*e.pricePerLiter,fullTank:e.fullTank!==false}));
    const m=[...entries,...added]; setEntries(m); await saveK("ft-v3",m); if(data.maintenance){const mk=new Set(maint.map(m=>m.id));const am=data.maintenance.filter(m=>!mk.has(m.id));const mm=[...maint,...am];setMaint(mm);await saveK("ft-maint-v3",mm);}
    showMsg(true,`${added.length} rifornimenti importati`);}catch{showMsg(false,"Errore JSON");} e.target.value=""; };
  const handleImportFuelio = async (e) => { const file=e.target.files?.[0]; if(!file)return; try{const parsed=parseFuelioCSV(await file.text());
    if(!parsed){showMsg(false,"Formato Fuelio non riconosciuto");return;} const keys=new Set(entries.map(e=>`${e.date}-${e.odometer}`));
    const added=parsed.filter(e=>!keys.has(`${e.date}-${e.odometer}`)); const m=[...entries,...added]; setEntries(m); await saveK("ft-v3",m);
    showMsg(true,`${added.length} importati da Fuelio`);}catch(err){showMsg(false,"Errore: "+err.message);} e.target.value=""; };

  // ═══ STYLES ═══
  const s = {
    inp:{width:"100%",padding:"10px 14px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,color:"#fff",fontSize:14,fontFamily:"'JetBrains Mono',monospace",outline:"none",boxSizing:"border-box",transition:"all 0.2s"},
    lbl:{display:"block",fontSize:12,color:"rgba(0,153,255,0.4)",marginBottom:6,fontWeight:600,letterSpacing:"0.12em",fontFamily:"'JetBrains Mono',monospace"},
    btn:{padding:"12px 24px",background:"linear-gradient(135deg,#0066cc,#0099ff)",border:"none",borderRadius:10,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"},
    btnSec:{padding:"10px 20px",background:"transparent",border:"1px solid rgba(0,100,200,0.2)",borderRadius:10,color:"#0099ff",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"},
    btnDanger:{padding:"10px 20px",background:"rgba(255,50,80,0.06)",border:"1px solid rgba(255,50,80,0.15)",borderRadius:8,color:"#ff3250",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"},
  };

  if (loading) return (
    <div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",height:"100vh",gap:16}}>
      <FordLogo size={120} />
      <div style={{fontSize:24,fontWeight:200,letterSpacing:"0.35em",fontFamily:"'Outfit',sans-serif",color:"#a0b8d8"}}>GALAXY</div>
      <div style={{color:"rgba(0,180,255,0.35)",fontSize:10,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.15em"}}>DASHBOARD LOADING...</div>
    </div>
  );

  const NAV = [
    {id:"dash",Icon:Home,label:"Dashboard"},
    {id:"analytics",Icon:BarChart3,label:"Analisi"},
    {id:"costs",Icon:DollarSign,label:"Costi"},
    {id:"add",Icon:PlusCircle,label:"Rifornimento"},
    {id:"log",Icon:List,label:"Storico"},
    {id:"maint",Icon:Wrench,label:"Manutenzione"},
    {id:"info",Icon:Car,label:"Veicolo"},
    {id:"adblue",Icon:Droplets,label:"AdBlue"},
    {id:"io",Icon:Database,label:"Dati"},
  ];

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {/* ═══ SIDEBAR ═══ */}
      <div style={{width:220,minWidth:220,background:"rgba(0,10,30,0.6)",borderRight:"1px solid rgba(0,80,180,0.1)",display:"flex",flexDirection:"column",padding:"0",overflow:"hidden"}}>
        {/* Logo */}
        <div style={{padding:"24px 20px 20px",borderBottom:"1px solid rgba(0,80,180,0.08)",textAlign:"center"}}>
          <FordLogo size={80}/>
          <div style={{fontSize:18,fontWeight:200,letterSpacing:"0.32em",fontFamily:"'Outfit',sans-serif",color:"#c8d8ec",marginTop:10}}>GALAXY</div>
          <div style={{fontSize:11,color:"rgba(0,160,255,0.75)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",marginTop:4}}>2.0 ECOBLUE 150CV</div>
        </div>
        {/* Nav items */}
        <div style={{padding:"12px 10px",flex:1,overflowY:"auto"}}>
          {NAV.map(n => {
            const active = view===n.id;
            return (
              <button key={n.id} onClick={()=>{setView(n.id);if(n.id==="add"&&!editId)setForm(f=>({...f,liters:"",price:"",odo:"",notes:""}));}} style={{
                display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 14px",background:active?"rgba(0,100,200,0.12)":"transparent",
                border:"none",borderRadius:8,color:active?"#0099ff":"rgba(180,200,230,0.8)",cursor:"pointer",fontSize:12,fontWeight:active?600:400,

                <ChartCard title="Per Tipo Carburante" icon={Fuel}>

                        <div><div style={{fontSize:16,fontWeight:600,color:"rgba(255,255,255,0.85)",fontFamily:"'JetBrains Mono',monospace"}}>€{fmtN(f.cost,0)}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.55)"}}>spesa</div></div>
                      </div>
                      {f.minL && <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",fontFamily:"'JetBrains Mono',monospace",marginTop:6}}>Range: {fmtN(f.minL,1)} — {fmtN(f.maxL,1)} l/100km</div>}
                    </div>
                  ))}
                </ChartCard>
              </div>

              {/* Tank Composition */}
              {tankComp.total > 0 && (
                <ChartCard title="Composizione Serbatoio (stima)" icon={Fuel} color="#00d4ff">
                  <div style={{marginBottom:12}}>
                    <div style={{display:"flex",height:32,borderRadius:8,overflow:"hidden",border:"1px solid rgba(255,255,255,0.06)"}}>
                      {tankComp.pctB7 > 0 && <div style={{width:tankComp.pctB7+"%",background:"linear-gradient(135deg,#f0c000,#e6b400)",transition:"width 0.5s"}}/>}
                      {tankComp.pctHVO > 0 && <div style={{width:tankComp.pctHVO+"%",background:"linear-gradient(135deg,#00d4ff,#0099cc)",transition:"width 0.5s"}}/>}
                      {tankComp["pctDiesel+"] > 0 && <div style={{width:tankComp["pctDiesel+"]+"%",background:"linear-gradient(135deg,#ff8c00,#cc7000)",transition:"width 0.5s"}}/>}
                      {tankComp.pctMix > 0 && <div style={{width:tankComp.pctMix+"%",background:"linear-gradient(135deg,#c080ff,#9060cc)",transition:"width 0.5s"}}/>}
                    </div>

                  {/* Cetane number */}
                  <div style={{textAlign:"center",marginBottom:14,padding:"10px 12px",background:"rgba(0,200,140,0.04)",borderRadius:8,border:"1px solid rgba(0,200,140,0.15)"}}>

                  <div style={{display:"grid",gridTemplateColumns:Object.entries({B7:tankComp.pctB7,HVO:tankComp.pctHVO,"Diesel+":tankComp["pctDiesel+"],Mix:tankComp.pctMix}).filter(([,v])=>v>0).map(()=>"1fr").join(" "),gap:10}}>
                    {[["B7",tankComp.pctB7,tankComp.B7,"240,192,0"],["HVO",tankComp.pctHVO,tankComp.HVO,"0,212,255"],["Diesel+",tankComp["pctDiesel+"],tankComp["Diesel+"],"255,140,0"],["Mix",tankComp.pctMix,tankComp.Mix,"192,128,255"]].filter(([,p])=>p>0).map(([name,pct,liters,rgb])=>(

                      </div>

                  <div style={{textAlign:"center",marginTop:10,fontSize:11,color:"rgba(255,255,255,0.5)",fontFamily:"'JetBrains Mono',monospace"}}>
                    Stima: {fmtN(tankComp.total,1)} L / 71 L nel serbatoio

                </ChartCard>
              )}
              {/* Cetane Calculator */}
              {tankComp.total > 0 && (
                <CetaneCalc tankComp={tankComp}/>

              {/* Recent entries */}
              <ChartCard title={`Ultimi Rifornimenti (${Math.min(5,enriched.length)})`} icon={Clock}>

                  {[...enriched].reverse().slice(0,5).map(e=>(
                    <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",background:"rgba(255,255,255,0.01)",borderRadius:10,border:"1px solid rgba(255,255,255,0.03)",cursor:"pointer"}} onClick={()=>handleEdit(e)}>

                        <div style={{width:3,height:32,borderRadius:2,background:FC[e.fuelType]}}/>

                          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,fontWeight:600,color:"#fff"}}>{fmtDate(e.date)}</span><span style={{fontSize:11,color:FC[e.fuelType],fontFamily:"'JetBrains Mono',monospace",padding:"1px 6px",border:`1px solid ${FC[e.fuelType]}25`,borderRadius:3}}>{e.fuelType}</span></div>
                          <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{fmtN(e.liters,1)}L · €{fmtN(e.totalCost,2)} · ODO {e.odometer.toLocaleString("it-IT")}</div>

                      </div>
                      <div style={{textAlign:"right"}}>{e.calc?(<><div style={{fontSize:20,fontWeight:700,color:"#0099ff",fontFamily:"'JetBrains Mono',monospace"}}>{fmtN(e.calc.lPer100,1)}</div><div style={{fontSize:11,color:"rgba(0,153,255,0.75)",fontFamily:"'JetBrains Mono',monospace"}}>L/100</div></>):<div style={{color:"rgba(255,255,255,0.1)"}}>—</div>}</div>
                    </div>
                  ))}
                </div>
              </ChartCard>
            </>)}
          </div>
        )}

        {/* ════════════ ANALYTICS ════════════ */}
        {view==="analytics" && (
          <div>
            <h1 style={{fontSize:14,fontWeight:600,color:"rgba(0,153,255,0.9)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.15em",marginBottom:24}}>◇ ANALISI CONSUMI</h1>

            {entries.length<2 ? (
              <div style={{textAlign:"center",padding:60,color:"rgba(255,255,255,0.6)",fontFamily:"'JetBrains Mono',monospace"}}>SERVONO ALMENO 2 PIENI PER LE ANALISI</div>
            ) : (<>
              {/* Stats row */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:8,marginBottom:20}}>
                <StatBox label="MEDIA" value={stats.avgL?fmtN(stats.avgL,1):"—"} unit="l/100" highlight={true} small/>

                <StatBox label="MASSIMO" value={stats.maxL?fmtN(stats.maxL,1):"—"} unit="l/100" color="#ff6b6b" small/>
                <StatBox label="€/KM MEDIA" value={stats.avgC?fmtN(stats.avgC,3):"—"} unit="€/km" small/>
                <StatBox label="€/KM MIN" value={stats.minC?fmtN(stats.minC,3):"—"} unit="€/km" color="#00c88a" small/>
                <StatBox label="€/KM MAX" value={stats.maxC?fmtN(stats.maxC,3):"—"} unit="€/km" color="#ff6b6b" small/>
                <StatBox label="MEDIA LITRI" value={stats.avgLiters?fmtN(stats.avgLiters,1):"—"} unit="L/pieno" small/>

                    <defs><linearGradient id="gA2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#c080ff" stopOpacity={0.15}/><stop offset="100%" stopColor="#c080ff" stopOpacity={0}/></linearGradient></defs>

                    <Tooltip {...TT("#c080ff","#c080ff")}/>
                    <Area type="monotone" dataKey="€/km" stroke="#c080ff" strokeWidth={2} fill="url(#gA2)" dot={{fill:"#c080ff",r:2.5}} activeDot={{r:5,stroke:"rgba(192,128,255,0.4)",strokeWidth:4}}/>

                      <Line type="monotone" dataKey="l/100km" stroke="#f0c000" strokeWidth={2.5} dot={{fill:"#f0c000",r:4}}/>
                    </ComposedChart></ResponsiveContainer>
                  </ChartCard>

                      <Tooltip {...TT()} formatter={v=>[v.toLocaleString("it-IT")+" km","Distanza"]}/>
                      <Bar dataKey="km" fill="#0099ff" radius={[4,4,0,0]} fillOpacity={0.6}/>

                    <Tooltip {...TT("#ff6b6b","#ff6b6b")}/>
                    <Area type="monotone" dataKey="€/L" stroke="#ff6b6b" strokeWidth={2} fill="url(#gA4)" dot={{fill:"#ff6b6b",r:2.5}}/>

                      <Scatter data={scatterData.filter(d=>d.fuel==="Mix")} fill={FC.Mix} name="Mix" fillOpacity={0.7}/>

                  </ChartCard>

                <ChartCard title="Consumo per Giorno Settimana" icon={Calendar} color="#c080ff" height={320}>

                    <Tooltip {...TT("#c080ff","#c080ff")}/>
                    <Bar dataKey="l/100km" fill="#c080ff" radius={[4,4,0,0]} fillOpacity={0.6}/>
                  </BarChart></ResponsiveContainer>
                </ChartCard>

                {/* Fill size distribution */}
                <ChartCard title="Distribuzione Litri per Pieno" icon={Fuel} color="#ffa832" height={320}>
                  <ResponsiveContainer width="100%" height={260}><BarChart data={fillSizes} margin={{top:5,right:10,left:-10,bottom:5}}>
                    {GRID}<XAxis dataKey="range" {...AX}/><YAxis {...AX} allowDecimals={false}/>
                    <Tooltip {...TT("#ffa832","#ffa832")} formatter={v=>[v,"Rifornimenti"]}/>
                    <Bar dataKey="count" fill="#ffa832" radius={[4,4,0,0]} fillOpacity={0.6}/>
                  </BarChart></ResponsiveContainer>
                </ChartCard>
              </div>

              {/* Monthly fuel type breakdown */}
              {monthlyData.length>=2 && (
                <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16,marginBottom:16}}>
                  <ChartCard title="Litri per Tipo Carburante (Mensile)" icon={Zap} span={1} height={320}>
                    <ResponsiveContainer width="100%" height={260}><BarChart data={monthlyData} margin={{top:5,right:10,left:-10,bottom:5}}>
                      {GRID}<XAxis dataKey="label" {...AX}/><YAxis {...AX}/>
                      <Tooltip {...TT()}/>
                      <Bar dataKey="B7" stackId="a" fill={FC.B7} fillOpacity={0.7}/>
                      <Bar dataKey="HVO" stackId="a" fill={FC.HVO} fillOpacity={0.7} radius={[3,3,0,0]}/>
                      <Bar dataKey="Mix" stackId="a" fill={FC.Mix} fillOpacity={0.7}/>
                    </BarChart></ResponsiveContainer>
                  </ChartCard>

                  {/* Fuel type pie */}

                      <td style={{textAlign:"center",color:"rgba(255,255,255,0.6)"}}>{m.desc}</td>
                      <td style={{textAlign:"center",color:"#ffa832",fontWeight:700}}>€{fmtN(m.cost,2)}</td>
                      <td style={{textAlign:"center",color:"rgba(255,255,255,0.3)"}}>{m.odometer>0?m.odometer.toLocaleString("it-IT"):"—"}</td>
                      <td style={{textAlign:"center",color:"rgba(255,255,255,0.55)",fontSize:10}}>{m.notes||""}</td>
                      <td style={{textAlign:"center",borderRadius:"0 8px 8px 0"}}>
                        <button style={{background:"none",border:"none",cursor:"pointer",opacity:0.3,fontSize:13,padding:"2px 4px"}} onClick={()=>handleEditMaint(m)}>✏️</button>
                        <button style={{background:"none",border:"none",cursor:"pointer",opacity:0.3,fontSize:13,padding:"2px 4px"}} onClick={()=>handleDeleteMaint(m.id)}>🗑️</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </>)}
          </div>
        )}

        {/* ════════════ INFO ════════════ */}
        {view==="info" && (
          <div>
            <h1 style={{fontSize:14,fontWeight:600,color:"rgba(0,153,255,0.9)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.15em",marginBottom:24}}>◇ VEICOLO & ASSICURAZIONE</h1>
            <div style={{display:"flex",gap:8,marginBottom:24}}>
              {[["veicolo","VEICOLO"],["assicurazione","ASSICURAZIONE"]].map(([id,label])=>(
                <button key={id} style={{padding:"10px 24px",background:infoTab===id?"rgba(0,100,200,0.1)":"transparent",border:`1px solid ${infoTab===id?"rgba(0,100,200,0.25)":"rgba(255,255,255,0.05)"}`,borderRadius:8,color:infoTab===id?"#0099ff":"rgba(255,255,255,0.3)",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"}} onClick={()=>setInfoTab(id)}>{label}</button>
              ))}
            </div>
            {infoTab==="veicolo" && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
                <ChartCard title="Identificazione" icon={Car}>{[["Targa",VEHICLE.targa],["VIN",VEHICLE.vin],["Immatricolazione",VEHICLE.immatricolazione],["Costruttore",VEHICLE.costruttore],["Modello",VEHICLE.modello],["Tipo",VEHICLE.tipo],["Categoria",VEHICLE.categoria],["Carrozzeria",VEHICLE.carrozzeria],["Acquisto",VEHICLE.acquisto],["Prezzo","€ "+VEHICLE.prezzoAcquisto.toLocaleString("it-IT")]].map(([l,v],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.02)"}}><span style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{l}</span><span style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.8)",fontFamily:"'JetBrains Mono',monospace",textAlign:"right",wordBreak:"break-all",maxWidth:"60%"}}>{v}</span></div>)}</ChartCard>
                <ChartCard title="Motore & Trasmissione" icon={Zap}>{[["Motore",VEHICLE.motore],["Alimentazione",VEHICLE.alimentazione],["Cilindrata",VEHICLE.cilindrata],["Potenza",VEHICLE.potenza],["Cambio",VEHICLE.cambio],["Normativa",VEHICLE.euro],["CO₂ WLTP",VEHICLE.co2],["Distribuzione",VEHICLE.distribuzione],["Intervallo BIO",VEHICLE.intervalloBIO]].map(([l,v],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.02)"}}><span style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{l}</span><span style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.8)",fontFamily:"'JetBrains Mono',monospace",textAlign:"right",maxWidth:"55%"}}>{v}</span></div>)}</ChartCard>
                <ChartCard title="Dimensioni & Peso" icon={Info}>{[["Lunghezza",VEHICLE.lunghezza],["Larghezza",VEHICLE.larghezza],["Posti",VEHICLE.posti],["Massa totale",VEHICLE.massaTotale],["Massa vuoto",VEHICLE.massaVuoto],["Massa traino",VEHICLE.massaTraino],["Serbatoio",VEHICLE.serbatoio],["Pneum. A1",VEHICLE.pneumaticiA1],["Pneum. A2",VEHICLE.pneumaticiA2],["Pneum. A3",VEHICLE.pneumaticiA3],["Revisione",VEHICLE.ultimaRevisione]].map(([l,v],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.02)"}}><span style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{l}</span><span style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.8)",fontFamily:"'JetBrains Mono',monospace",textAlign:"right",maxWidth:"55%"}}>{v}</span></div>)}</ChartCard>
              </div>
            )}
            {infoTab==="assicurazione" && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <div>
                  <ChartCard title="Polizza" icon={Info} color="#c080ff">
                    <div style={{textAlign:"center",marginBottom:16}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{INSURANCE.compagnia}</div>
                      <div style={{fontSize:12,color:"rgba(0,160,255,0.75)",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>N° {INSURANCE.polizza}</div>
                      <div style={{fontSize:32,fontWeight:700,color:"#0099ff",fontFamily:"'JetBrains Mono',monospace",marginTop:12}}>€ {INSURANCE.totale.toFixed(2)}</div>
                    </div>
                    {[["Agenzia",INSURANCE.agenzia],["Decorrenza",INSURANCE.decorrenza],["Scadenza",INSURANCE.scadenza],["Classe CU",INSURANCE.classeCU],["Classe VHV",INSURANCE.classeVHV],["Forma",INSURANCE.forma],["Massimale RC",INSURANCE.massimaleRC],["Premio netto","€ "+INSURANCE.premioNetto.toFixed(2)],["Imposte","€ "+INSURANCE.imposte.toFixed(2)],["SSN","€ "+INSURANCE.ssn.toFixed(2)]].map(([l,v],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.02)"}}><span style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{l}</span><span style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.8)",fontFamily:"'JetBrains Mono',monospace"}}>{v}</span></div>)}
                  </ChartCard>
                </div>
                <ChartCard title="Garanzie" icon={Check} color="#00c88a">
                  {INSURANCE.garanzie.map((g,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.02)",opacity:g.attiva?1:0.3}}>
                      <div><div style={{fontSize:11,fontWeight:600,color:"#fff"}}>{g.nome}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.6)",fontFamily:"'JetBrains Mono',monospace",marginTop:1}}>{g.dettaglio}</div></div>
                      {g.attiva?<span style={{fontSize:12,fontWeight:700,color:"#0099ff",fontFamily:"'JetBrains Mono',monospace"}}>€{fmtN(g.premio,2)}</span>:<span style={{fontSize:11,color:"rgba(255,255,255,0.45)",fontFamily:"'JetBrains Mono',monospace"}}>ESCLUSA</span>}
                    </div>
                  ))}
                </ChartCard>
              </div>
            )}
          </div>
        )}

        {/* ════════════ ADBLUE ════════════ */}
        {view==="adblue" && (
          <div>
            <h1 style={{fontSize:14,fontWeight:600,color:"rgba(0,180,255,0.5)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.15em",marginBottom:24}}>◇ ADBLUE</h1>
            <div style={{maxWidth:700,marginBottom:32}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:12}}>
                <div><label style={s.lbl}>DATA</label><input type="date" value={abForm.date} onChange={e=>setAbForm(f=>({...f,date:e.target.value}))} style={s.inp}/></div>
                <div><label style={s.lbl}>LITRI</label><input type="number" step="0.01" placeholder="10" value={abForm.liters} onChange={e=>setAbForm(f=>({...f,liters:e.target.value}))} style={s.inp}/></div>
                <div><label style={s.lbl}>COSTO €</label><input type="number" step="0.01" placeholder="15.00" value={abForm.cost} onChange={e=>setAbForm(f=>({...f,cost:e.target.value}))} style={s.inp}/></div>
                <div><label style={s.lbl}>ODOMETRO (KM)</label><input type="number" placeholder="195000" value={abForm.odo} onChange={e=>setAbForm(f=>({...f,odo:e.target.value}))} style={s.inp}/></div>
              </div>
              <div style={{marginBottom:16}}><label style={s.lbl}>NOTE</label><input type="text" placeholder="tipo, fornitore..." value={abForm.notes} onChange={e=>setAbForm(f=>({...f,notes:e.target.value}))} style={s.inp}/></div>
              <div style={{display:"flex",gap:12}}>
                <button style={{...s.btn,background:"linear-gradient(135deg,#0088cc,#00bbff)"}} onClick={handleAbSubmit}>{editAbId?"SALVA":"REGISTRA ADBLUE"}</button>
                {editAbId&&<button style={s.btnSec} onClick={()=>{setEditAbId(null);setAbForm({date:new Date().toISOString().slice(0,10),liters:"",cost:"",odo:"",notes:""});}}>ANNULLA</button>}
              </div>
            </div>

            {abStats && (
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:32}}>
                <ChartCard title="Consumo" icon={Droplets} color="#00bbff">
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:28,fontWeight:700,color:"#00bbff",fontFamily:"'JetBrains Mono',monospace"}}>{fmtN(abStats.lPer1000,1)}</div>
                    <div style={{fontSize:12,color:"rgba(0,180,255,0.75)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"}}>L / 1.000 KM</div>
                  </div>
                </ChartCard>
                <ChartCard title="Intervallo" icon={Route} color="#00bbff">
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:28,fontWeight:700,color:"#00bbff",fontFamily:"'JetBrains Mono',monospace"}}>{abStats.avgInterval.toLocaleString("it-IT")}</div>
                    <div style={{fontSize:12,color:"rgba(0,180,255,0.75)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"}}>KM MEDI TRA RABBOCCHI</div>
                  </div>
                </ChartCard>
                <ChartCard title="Prossimo Rabbocco" icon={Target} color="#00bbff">
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:28,fontWeight:700,color:abStats.estNextKm && abStats.kmSinceLast > abStats.avgInterval*0.85?"#ff6b6b":"#00bbff",fontFamily:"'JetBrains Mono',monospace"}}>{abStats.estNextKm ? abStats.estNextKm.toLocaleString("it-IT") : "—"}</div>
                    <div style={{fontSize:12,color:"rgba(0,180,255,0.75)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"}}>KM STIMATI</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{abStats.kmSinceLast.toLocaleString("it-IT")} km dall'ultimo</div>
                  </div>
                </ChartCard>
                <ChartCard title="Totale" icon={DollarSign} color="#00bbff">
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:28,fontWeight:700,color:"#00bbff",fontFamily:"'JetBrains Mono',monospace"}}>{fmtN(abStats.totalL,1)}</div>
                    <div style={{fontSize:12,color:"rgba(0,180,255,0.75)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"}}>LITRI · € {fmtN(abStats.totalCost,2)}</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{abStats.count} rabbocchi · {abStats.kmSpan.toLocaleString("it-IT")} km</div>
                  </div>
                </ChartCard>
              </div>
            )}

            {adblue.length>0 && (<>
              <div style={{fontSize:11,color:"rgba(0,180,255,0.4)",fontFamily:"'JetBrains Mono',monospace",marginBottom:16}}>STORICO: {adblue.length} RABBOCCHI</div>
              <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 4px",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>
                <thead><tr style={{fontSize:12,color:"rgba(0,180,255,0.85)",letterSpacing:"0.1em"}}>{["DATA","LITRI","COSTO","KM","NOTE",""].map((h,i)=><th key={i} style={{padding:"8px 10px",textAlign:i<1?"left":"center",fontWeight:600}}>{h}</th>)}</tr></thead>
                <tbody>
                  {[...adblue].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(a=>(
                    <tr key={a.id} style={{background:"rgba(255,255,255,0.015)"}}>
                      <td style={{padding:"10px 12px",color:"#fff",fontWeight:600,borderRadius:"8px 0 0 8px"}}>{fmtDate(a.date)}</td>
                      <td style={{textAlign:"center",color:"#00bbff",fontWeight:700}}>{fmtN(a.liters,1)} L</td>
                      <td style={{textAlign:"center",color:"rgba(255,255,255,0.6)"}}>€{fmtN(a.cost,2)}</td>
                      <td style={{textAlign:"center",color:"rgba(255,255,255,0.5)"}}>{a.odometer.toLocaleString("it-IT")}</td>
                      <td style={{textAlign:"center",color:"rgba(255,255,255,0.55)",fontSize:10}}>{a.notes||""}</td>
                      <td style={{textAlign:"center",borderRadius:"0 8px 8px 0"}}>
                        <button style={{background:"none",border:"none",cursor:"pointer",opacity:0.3,fontSize:13,padding:"2px 4px"}} onClick={()=>handleAbEdit(a)}>✏️</button>
                        <button style={{background:"none",border:"none",cursor:"pointer",opacity:0.3,fontSize:13,padding:"2px 4px"}} onClick={()=>handleAbDelete(a.id)}>🗑️</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </>)}
          </div>
        )}

        {/* ════════════ IO ════════════ */}
        {view==="io" && (
          <div style={{maxWidth:700}}>
            <h1 style={{fontSize:14,fontWeight:600,color:"rgba(0,153,255,0.9)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.15em",marginBottom:24}}>◇ IMPORTA / ESPORTA</h1>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:32}}>
              <ChartCard title="Importa" icon={Upload}>
                <label style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,cursor:"pointer",marginBottom:10}}>
                  <input type="file" accept=".csv" onChange={handleImportFuelio} style={{display:"none"}}/><span style={{fontSize:20}}>📱</span><div><div style={{fontSize:12,fontWeight:700,color:"#fff"}}>IMPORTA DA FUELIO</div><div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:2}}>CSV esportato da Fuelio</div></div>
                </label>
                <label style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,cursor:"pointer"}}>
                  <input type="file" accept=".json" onChange={handleImportJSON} style={{display:"none"}}/><span style={{fontSize:20}}>📥</span><div><div style={{fontSize:12,fontWeight:700,color:"#fff"}}>RIPRISTINA BACKUP</div><div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:2}}>Backup JSON completo</div></div>
                </label>
              </ChartCard>
              <ChartCard title="Esporta" icon={Download}>
                {entries.length===0?<div style={{color:"rgba(255,255,255,0.6)",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>NESSUN DATO</div>:(
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {[["📄","CSV (Excel)","Semicolon-separated",()=>exportCSV(entries)],["📱","FUELIO (CSV)","Compatibile Fuelio",()=>exportFuelio(entries)],["💾","JSON (Backup)","Backup completo",()=>exportJSON(entries,maint)]].map(([icon,title,desc,fn],i)=>(
                      <button key={i} onClick={fn} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,cursor:"pointer",textAlign:"left",width:"100%",color:"#fff"}}>
                        <span style={{fontSize:20}}>{icon}</span><div><div style={{fontSize:12,fontWeight:700}}>{title}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:2}}>{desc}</div></div>
                      </button>
                    ))}
                  </div>
                )}
              </ChartCard>
            </div>
            <ChartCard title="Sistema" icon={Info} color="#ff6b6b">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:11,color:"rgba(0,153,255,0.4)",fontFamily:"'JetBrains Mono',monospace"}}>{entries.length} RIFORNIMENTI · {maint.length} SPESE</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>FUEL € {fmtN(stats.cost,0)} + MAINT € {fmtN(totalMaintCost,0)} = € {fmtN(stats.cost+totalMaintCost,0)}</div>
                </div>
                <button style={s.btnDanger} onClick={handleReset}>⚠ CANCELLA TUTTI I DATI</button>
              </div>
            </ChartCard>
          </div>
        )}

      </div>
    </div>
  );
}

// ═══ AUTH ═══
const USERS = { prova: 'prova', vanholy: 'animal' };
const AUTH_KEY = 'fuel-auth-v1';

const LoginScreen = ({ onLogin }) => {
  const [user, setUser] = React.useState('');
  const [pass, setPass] = React.useState('');
  const [err, setErr] = React.useState('');
  const [shake, setShake] = React.useState(false);
  const handle = () => {
    if (USERS[user] && USERS[user] === pass) {
      localStorage.setItem(AUTH_KEY, user);
      onLogin(user);
    } else {
      setErr('Credenziali non valide');
      setShake(true);
      setTimeout(() => { setErr(''); setShake(false); }, 1400);
    }
  };
  return (
    <div style={{position:'fixed',inset:0,background:'#050a18',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:9999}}>
      <FordLogo size={90}/>
      <div style={{marginTop:22,fontSize:11,color:'rgba(0,150,255,0.45)',fontFamily:"'JetBrains Mono',monospace",letterSpacing:'0.22em',fontWeight:700}}>GALAXY FUEL TRACKER</div>
      <div style={{marginTop:6,fontSize:9,color:'rgba(255,255,255,0.12)',fontFamily:"'JetBrains Mono',monospace",letterSpacing:'0.15em'}}>DASHBOARD — ACCESSO RISERVATO</div>
      <div style={{marginTop:40,width:360,background:'rgba(255,255,255,0.02)',border:'1px solid rgba(0,100,200,0.15)',borderRadius:18,padding:'32px 28px',animation:shake?'loginShake 0.4s ease':'none'}}>
        <div style={{marginBottom:20,fontSize:9,color:'rgba(0,120,255,0.35)',fontFamily:"'JetBrains Mono',monospace",letterSpacing:'0.18em',fontWeight:700}}>CREDENZIALI</div>
        <input placeholder="Username" value={user} onChange={e=>setUser(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()} autoCapitalize="none" autoCorrect="off" spellCheck={false}
          style={{width:'100%',marginBottom:12,padding:'13px 16px',background:'rgba(0,100,200,0.06)',border:'1px solid rgba(0,100,200,0.18)',borderRadius:9,color:'#fff',fontSize:14,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}/>
        <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()}
          style={{width:'100%',marginBottom:22,padding:'13px 16px',background:'rgba(0,100,200,0.06)',border:'1px solid rgba(0,100,200,0.18)',borderRadius:9,color:'#fff',fontSize:14,fontFamily:"'JetBrains Mono',monospace",outline:'none'}}/>
        <button onClick={handle}
          style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,#003a88,#0060d0)',border:'none',borderRadius:9,color:'#fff',fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",letterSpacing:'0.14em',cursor:'pointer',boxShadow:'0 4px 24px rgba(0,80,200,0.25)'}}>
          ACCEDI
        </button>
        {err && <div style={{marginTop:14,textAlign:'center',fontSize:11,color:'#ff5555',fontFamily:"'JetBrains Mono',monospace"}}>{err}</div>}
      </div>
    </div>
  );
};

function Root() {
  const [authUser, setAuthUser] = React.useState(() => localStorage.getItem(AUTH_KEY));
  if (!authUser) return <LoginScreen onLogin={setAuthUser}/>;
  return (
    <>
      <App/>
      <button onClick={()=>{localStorage.removeItem(AUTH_KEY);setAuthUser(null);}}
        style={{position:'fixed',top:16,right:20,zIndex:9990,padding:'6px 14px',background:'rgba(5,10,24,0.9)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:20,color:'rgba(255,255,255,0.22)',fontSize:9,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer',backdropFilter:'blur(10px)',letterSpacing:'0.1em'}}>
        LOGOUT
      </button>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Root));
</script>
</body>
</html>
