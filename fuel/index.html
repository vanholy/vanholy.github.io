// Storage
const loadK = async (k) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : []; } catch { return []; } };
const saveK = async (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

const calcCons = (cur, prev) => { if (!prev) return null; const km = cur.odometer - prev.odometer; if (km <= 0) return null; return { kmDriven: km, lPer100: (cur.liters / km) * 100, costPerKm: cur.totalCost / km }; };

const dl = (content, name, type) => { const b = new Blob([content], { type }); const u = URL.createObjectURL(b); const a = Object.assign(document.createElement("a"), { href: u, download: name }); document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); };
const detectFuel = (n) => { if (!n) return "B7"; const l = n.toLowerCase(); return l.includes("hvo") ? "HVO" : l.includes("mix") ? "Mix" : "B7"; };

// Fuelio CSV parser
const parseFuelioCSV = (text) => {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean); let logStart = -1;
  for (let i = 0; i < lines.length; i++) { if (lines[i].replace(/"/g,"").trim()==="## Log") { logStart=i; break; } }
  if (logStart===-1) return null;
  const pL = (line) => { const r=[]; let c="",q=false; for(let i=0;i<line.length;i++){const ch=line[i]; if(ch==='"')q=!q; else if(ch===','&&!q){r.push(c.trim());c="";}else c+=ch;} r.push(c.trim()); return r; };
  const h=pL(lines[logStart+1]).map(x=>x.toLowerCase()); const entries=[];
  const iD=h.findIndex(x=>x.includes("data")),iO=h.findIndex(x=>x.includes("odo")),iF=h.findIndex(x=>x.includes("fuel")&&!x.includes("type")),
    iFl=h.findIndex(x=>x.includes("full")),iP=h.findIndex(x=>x.includes("price")&&!x.includes("volume")),iN=h.findIndex(x=>x.includes("notes")),iVP=h.findIndex(x=>x.includes("volumeprice"));
  if(iD===-1||iO===-1||iF===-1) return null;
  let logEnd=lines.length; for(let i=logStart+2;i<lines.length;i++){if(lines[i].replace(/"/g,"").trim().startsWith("##")){logEnd=i;break;}}
  for(let i=logStart+2;i<logEnd;i++){const cols=pL(lines[i]); if(cols.length<3)continue;
    const date=cols[iD],odo=parseFloat(cols[iO]),lit=parseFloat(cols[iF]),full=iFl>=0?cols[iFl]==="1":true,notes=iN>=0?(cols[iN]||""):"";
    if(!date||isNaN(odo)||isNaN(lit)||lit<=0)continue; let ppl=0;
    if(iVP>=0&&cols[iVP]){const vp=parseFloat(cols[iVP]);if(!isNaN(vp)&&vp>0&&vp<10)ppl=vp;}
    if(ppl===0&&iP>=0&&cols[iP]){const tp=parseFloat(cols[iP]);if(!isNaN(tp)&&tp>0)ppl=tp>lit*5?tp/lit:tp<5?tp:tp/lit;}
    entries.push({id:genId(),date:date.slice(0,10),odometer:Math.round(odo),liters:Math.round(lit*1000)/1000,pricePerLiter:Math.round(ppl*1000)/1000,totalCost:Math.round(lit*ppl*100)/100,fullTank:full,fuelType:detectFuel(notes),notes});
  } return entries.length>0?entries:null;
};

const exportFuelio=(entries)=>{const s=[...entries].sort((a,b)=>a.odometer-b.odometer);const l=['"## Vehicle"','"Name","Description","DistUnit","FuelUnit","ConsumptionUnit","ImportCSVDateFormat","VIN","Insurance","Plate","Make","Model","Year","TankCount","Tank1Type","Tank2Type","Active","Tank1Capacity","Tank2Capacity"','"Ford Galaxy 2.0 EcoBlue","","1","1","1","yyyy-MM-dd","WF0KXXWPCKJP17573","","FV695GW","Ford","Galaxy","2019","1","100","0","1","71.0","0.0"','"## Log"','"Data","Odo (km)","Fuel (litres)","Full","Price (optional)","l/100km (optional)","latitude (optional)","longitude (optional)","City (optional)","Notes (optional)","Missed","TankNumber","FuelType","VolumePrice","StationID (optional)","ExcludeDistance","UniqueId","TankCalc"'];s.forEach(e=>{const n=e.fuelType!=="B7"?`[${e.fuelType}] ${e.notes||""}`.trim():(e.notes||"");l.push(`"${e.date}","${e.odometer}","${e.liters.toFixed(3)}","${e.fullTank?1:0}","${e.totalCost.toFixed(2)}","0.0","","","","${n}","0","1","102","${e.pricePerLiter.toFixed(3)}","0","0.0","0","0.0"`);});dl(l.join("\n"),`galaxy_fuelio_${new Date().toISOString().slice(0,10)}.csv`,"text/csv;charset=utf-8");};

      <text x="150" y="87" textAnchor="middle" fontFamily="'Georgia','Times New Roman','Palatino',serif" fontSize="70" fontWeight="400" fontStyle="italic" fill="rgba(0,20,60,0.5)" letterSpacing="-2" transform="translate(1,1.5)">Ford</text>
      <text x="150" y="87" textAnchor="middle" fontFamily="'Georgia','Times New Roman','Palatino',serif" fontSize="70" fontWeight="400" fontStyle="italic" fill="url(#fTxt)" letterSpacing="-2">Ford</text>
      {/* Glass shine overlay — clipped to oval */}
      <g clipPath="url(#fClip)">
        <ellipse cx="150" cy="20" rx="120" ry="52" fill="url(#fShine)" />
        <ellipse cx="150" cy="120" rx="130" ry="50" fill="url(#fBtm)" />
      </g>
      {/* Tiny specular highlight */}
      <ellipse cx="110" cy="38" rx="35" ry="8" fill="rgba(255,255,255,0.10)" transform="rotate(-12,110,38)"/>
    </svg>
  );
};

// ═══════════ COMPONENT ═══════════
function App() {
  const [entries, setEntries] = useState([]);
  const [maint, setMaint] = useState([]);
  const [view, setView] = useState("dash");
  const [subView, setSubView] = useState("fuel"); // for log tab: fuel | maint
  const [infoTab, setInfoTab] = useState("veicolo"); // veicolo | assicurazione
  const [loading, setLoading] = useState(true);
  const [editId, setEditId] = useState(null);
  const [editMaintId, setEditMaintId] = useState(null);
  const [msg, setMsg] = useState(null);
  const [form, setForm] = useState({ date: new Date().toISOString().slice(0,10), liters:"", price:"", odo:"", fuel:"HVO", full:true, notes:"" });
  const [mForm, setMForm] = useState({ date: new Date().toISOString().slice(0,10), type:"Tagliando", desc:"", cost:"", odo:"", notes:"" });

  useEffect(() => { Promise.all([loadK("ft-v3"), loadK("ft-maint-v3")]).then(([f,m]) => { setEntries(f); setMaint(m); setLoading(false); }); }, []);
  const showMsg = (ok, text) => { setMsg({ ok, text }); setTimeout(() => setMsg(null), 4000); };

  // Fuel calculations
  const sorted = [...entries].sort((a,b) => a.odometer - b.odometer);
  const enriched = sorted.map((e,i) => ({ ...e, calc: e.fullTank ? calcCons(e, i>0 ? sorted[i-1] : null) : null }));
  const withCalc = enriched.filter(e => e.calc);
  const stats = { n: entries.length, liters: entries.reduce((s,e) => s+e.liters, 0), cost: entries.reduce((s,e) => s+e.totalCost, 0),
    km: withCalc.reduce((s,e) => s+e.calc.kmDriven, 0), avgL: withCalc.length ? withCalc.reduce((s,e) => s+e.calc.lPer100, 0)/withCalc.length : null,
    avgC: withCalc.length ? withCalc.reduce((s,e) => s+e.calc.costPerKm, 0)/withCalc.length : null };
  const byFuel = FUEL_TYPES.map(ft => { const f=withCalc.filter(e=>e.fuelType===ft), all=entries.filter(e=>e.fuelType===ft);
    return { type:ft, count:all.length, avgL:f.length?f.reduce((s,e)=>s+e.calc.lPer100,0)/f.length:null, avgC:f.length?f.reduce((s,e)=>s+e.calc.costPerKm,0)/f.length:null, liters:all.reduce((s,e)=>s+e.liters,0), cost:all.reduce((s,e)=>s+e.totalCost,0) }; }).filter(s => s.count > 0);
  const chartData = withCalc.map(e => ({ date:fmtDate(e.date), "l/100km":+e.calc.lPer100.toFixed(2), "€/km":+e.calc.costPerKm.toFixed(3) }));
  const totalMaintCost = maint.reduce((s,m) => s + m.cost, 0);

  // Monthly aggregations for Stats
  const monthlyFuel = (() => {
    const m = {}; entries.forEach(e => { const k = e.date.slice(0,7); if(!m[k]) m[k]={month:k,liters:0,cost:0,count:0}; m[k].liters+=e.liters; m[k].cost+=e.totalCost; m[k].count++; });
    return Object.values(m).sort((a,b)=>a.month.localeCompare(b.month)).map(x=>({...x, label: new Date(x.month+"-15").toLocaleDateString("it-IT",{month:"short",year:"2-digit"})}));
  })();
  const monthlyKm = (() => {
    const m = {}; withCalc.forEach(e => { const k = e.date.slice(0,7); if(!m[k]) m[k]={month:k,km:0}; m[k].km+=e.calc.kmDriven; });
    return Object.values(m).sort((a,b)=>a.month.localeCompare(b.month)).map(x=>({...x, label: new Date(x.month+"-15").toLocaleDateString("it-IT",{month:"short",year:"2-digit"})}));
  })();
  const monthlyCons = (() => {
    const m = {}; withCalc.forEach(e => { const k = e.date.slice(0,7); if(!m[k]) m[k]={month:k,totL:0,totKm:0}; m[k].totL+=e.liters; m[k].totKm+=e.calc.kmDriven; });
    return Object.values(m).sort((a,b)=>a.month.localeCompare(b.month)).map(x=>({...x, "l/100km":+(x.totL/x.totKm*100).toFixed(2), label: new Date(x.month+"-15").toLocaleDateString("it-IT",{month:"short",year:"2-digit"})}));
  })();
  const costBreakdown = [ {name:"Carburante",value:+stats.cost.toFixed(0),color:"#0099ff"}, {name:"Manutenzione",value:+totalMaintCost.toFixed(0),color:"#ffa832"}, {name:"Assicurazione",value:1086,color:"#c080ff"} ].filter(x=>x.value>0);
  const totalOwnership = costBreakdown.reduce((s,x)=>s+x.value,0);

  // Handlers
  const handleSubmit = async () => {
    const liters=parseFloat(form.liters),price=parseFloat(form.price),odo=parseInt(form.odo); if(!liters||!price||!odo) return;
    const entry = { id:editId||genId(), date:form.date, liters, pricePerLiter:price, odometer:odo, totalCost:Math.round(liters*price*100)/100, fuelType:form.fuel, fullTank:form.full, notes:form.notes };
    const u = editId ? entries.map(e=>e.id===editId?entry:e) : [...entries,entry]; setEntries(u); await saveK("ft-v3",u);
    setForm({date:new Date().toISOString().slice(0,10),liters:"",price:"",odo:"",fuel:"HVO",full:true,notes:""}); setEditId(null); setView("dash");
  };
  const handleMaintSubmit = async () => {
    const cost=parseFloat(mForm.cost),odo=mForm.odo?parseInt(mForm.odo):0; if(!mForm.desc||isNaN(cost)) return;
    const entry = { id:editMaintId||genId(), date:mForm.date, type:mForm.type, desc:mForm.desc, cost, odometer:odo, notes:mForm.notes };
    const u = editMaintId ? maint.map(m=>m.id===editMaintId?entry:m) : [...maint,entry]; setMaint(u); await saveK("ft-maint-v3",u);
    setMForm({date:new Date().toISOString().slice(0,10),type:"Tagliando",desc:"",cost:"",odo:"",notes:""}); setEditMaintId(null); showMsg(true,"Spesa registrata");
  };
  const handleDelete = async (id) => { const u=entries.filter(e=>e.id!==id); setEntries(u); await saveK("ft-v3",u); };
  const handleDeleteMaint = async (id) => { const u=maint.filter(m=>m.id!==id); setMaint(u); await saveK("ft-maint-v3",u); };
  const handleEdit = (e) => { setForm({date:e.date,liters:""+e.liters,price:""+e.pricePerLiter,odo:""+e.odometer,fuel:e.fuelType,full:e.fullTank,notes:e.notes||""}); setEditId(e.id); setView("add"); };
  const handleEditMaint = (m) => { setMForm({date:m.date,type:m.type,desc:m.desc,cost:""+m.cost,odo:m.odometer?""+m.odometer:"",notes:m.notes||""}); setEditMaintId(m.id); };
  const handleReset = async () => { if(confirm("Cancellare TUTTI i dati?")){ setEntries([]); setMaint([]); await saveK("ft-v3",[]); await saveK("ft-maint-v3",[]); }};
  const handleImportJSON = async (e) => { const file=e.target.files?.[0]; if(!file)return; try{const data=JSON.parse(await file.text()); const imp=data.entries||data;
    if(!Array.isArray(imp)||!imp.length){showMsg(false,"File non valido");return;} const keys=new Set(entries.map(e=>`${e.date}-${e.odometer}`));
    const added=imp.filter(e=>e.date&&e.odometer&&!keys.has(`${e.date}-${e.odometer}`)).map(e=>({...e,id:e.id||genId(),totalCost:e.totalCost||e.liters*e.pricePerLiter,fullTank:e.fullTank!==false}));
    const m=[...entries,...added]; setEntries(m); await saveK("ft-v3",m); if(data.maintenance){const mk=new Set(maint.map(m=>m.id));const am=data.maintenance.filter(m=>!mk.has(m.id));const mm=[...maint,...am];setMaint(mm);await saveK("ft-maint-v3",mm);}
    showMsg(true,`${added.length} rifornimenti importati`); }catch{showMsg(false,"Errore JSON");} e.target.value=""; };
  const handleImportFuelio = async (e) => { const file=e.target.files?.[0]; if(!file)return; try{const parsed=parseFuelioCSV(await file.text());
    if(!parsed){showMsg(false,"Formato Fuelio non riconosciuto");return;} const keys=new Set(entries.map(e=>`${e.date}-${e.odometer}`));
    const added=parsed.filter(e=>!keys.has(`${e.date}-${e.odometer}`)); const m=[...entries,...added]; setEntries(m); await saveK("ft-v3",m);

              <div style={{fontSize:20,color:"#0099ff"}}>📱</div><div style={{flex:1}}><div style={S.ioTitle}>IMPORTA DA FUELIO</div><div style={S.ioDesc}>CSV esportato da Fuelio. Scrivi "HVO" o "Mix" nelle note per il tipo.</div></div>
            </label>
            <label style={S.ioCard}><input type="file" accept=".json" onChange={handleImportJSON} style={{display:"none"}}/>
              <div style={{fontSize:20,color:"#c080ff"}}>📥</div><div style={{flex:1}}><div style={S.ioTitle}>RIPRISTINA BACKUP</div><div style={S.ioDesc}>Backup JSON (include rifornimenti e spese manutenzione).</div></div>
            </label>
            <div style={{...S.secTitle,marginTop:24}}>◇ ESPORTA</div>
            {entries.length===0?<div style={{fontSize:10,color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace"}}>NESSUN DATO</div>:(
              <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {[["📄","CSV","Excel",()=>exportCSV(entries)],["📱","FUELIO","CSV",()=>exportFuelio(entries)],["💾","JSON","Backup",()=>exportJSON(entries,maint)]].map(([i,t,d,fn],idx)=>(
                    <button key={idx} style={S.ioBtn} onClick={fn}><div style={{fontSize:20,marginBottom:4}}>{i}</div><div style={{fontSize:10,fontWeight:700,color:"#fff"}}>{t}</div><div style={{fontSize:8,color:"rgba(255,255,255,0.2)",marginTop:2}}>{d}</div></button>
                  ))}
                </div>
                <div style={{...S.secTitle,marginTop:24}}>◇ SISTEMA</div>
                <div style={S.hCard}>
                  <div style={{fontSize:10,color:"rgba(0,153,255,0.4)",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>{entries.length} RIFORNIMENTI · {maint.length} SPESE</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace",marginBottom:12}}>FUEL € {fmtN(stats.cost,0)} + MAINT € {fmtN(totalMaintCost,0)} = € {fmtN(stats.cost+totalMaintCost,0)}</div>
                  <button style={S.danger} onClick={handleReset}>⚠ CANCELLA TUTTI I DATI</button>
                </div>
              </>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

const S = {

  navBtn:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:"none",border:"none",color:"rgba(180,200,230,0.45)",cursor:"pointer",padding:"8px 8px 6px",borderRadius:10,transition:"all 0.25s"},
  navAct:{color:"#2dabff",background:"rgba(0,120,255,0.1)",boxShadow:"0 0 14px rgba(0,120,255,0.1)"},
  content:{padding:"16px 20px",position:"relative",zIndex:1},
  grid4:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14},
  card:{background:"rgba(255,255,255,0.02)",borderRadius:10,padding:"13px 15px",border:"1px solid rgba(255,255,255,0.04)"},
  chartBox:{background:"rgba(0,60,140,0.03)",borderRadius:10,padding:"14px 10px",border:"1px solid rgba(0,80,180,0.08)",marginBottom:14},
  chartTitle:{fontSize:9,fontWeight:600,color:"rgba(0,153,255,0.4)",marginBottom:12,paddingLeft:4,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.12em"},
  secTitle:{fontSize:9,fontWeight:600,color:"rgba(0,153,255,0.35)",marginBottom:12,marginTop:8,letterSpacing:"0.15em",fontFamily:"'JetBrains Mono',monospace"},
  row:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"rgba(255,255,255,0.015)",borderRadius:10,marginBottom:6,border:"1px solid rgba(255,255,255,0.03)",cursor:"pointer"},
  empty:{textAlign:"center",padding:"40px 20px"},
  hCard:{background:"rgba(255,255,255,0.02)",borderRadius:10,padding:14,border:"1px solid rgba(255,255,255,0.04)",marginBottom:8},
  iconBtn:{background:"none",border:"none",cursor:"pointer",fontSize:13,padding:"3px 5px",borderRadius:4,opacity:0.4},

  inp:{width:"100%",padding:"11px 13px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,color:"#fff",fontSize:15,fontFamily:"'JetBrains Mono',monospace",outline:"none",boxSizing:"border-box",transition:"all 0.2s"},
  fuelOpt:{flex:1,padding:"10px 0",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,color:"rgba(255,255,255,0.3)",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",transition:"all 0.2s"},

  secondary:{width:"100%",padding:"11px 0",background:"transparent",border:"1px solid rgba(0,100,200,0.2)",borderRadius:10,color:"#0099ff",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"},

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
