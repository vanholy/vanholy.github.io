\nconst FUEL_TYPES = ["B7", "HVO", "Mix"];\nconst MAINT_TYPES = ["Tagliando", "Riparazione", "Pneumatici", "Revisione", "Carrozzeria", "Altro"];\nconst genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);\nconst fmtDate = (iso) => new Date(iso).toLocaleDateString("it-IT", { day: "2-digit", month: "short", year: "2-digit" });\nconst fmtN = (n, d = 2) => (n != null && !isNaN(n)) ? Number(n).toFixed(d) : "—";\n\n// Storage\nconst loadK = async (k) => { try { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : []; } catch { return []; } };\nconst saveK = async (k, v) => { try { await window.storage.set(k, JSON.stringify(v)); } catch {} };\n\nconst calcCons = (cur, prev) => { if (!prev) return null; const km = cur.odometer - prev.odometer; if (km <= 0) return null; return { kmDriven: km, lPer100: (cur.liters / km) * 100, costPerKm: cur.totalCost / km }; };\n\nconst dl = (content, name, type) => { const b = new Blob([content], { type }); const u = URL.createObjectURL(b); const a = Object.assign(document.createElement("a"), { href: u, download: name }); document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); };\nconst detectFuel = (n) => { if (!n) return "B7"; const l = n.toLowerCase(); return l.includes("hvo") ? "HVO" : l.includes("mix") ? "Mix" : "B7"; };\n\n// Fuelio CSV parser\nconst parseFuelioCSV = (text) => {\n  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean); let logStart = -1;\n  for (let i = 0; i < lines.length; i++) { if (lines[i].replace(/"/g,"").trim()==="## Log") { logStart=i; break; } }\n  if (logStart===-1) return null;\n  const pL = (line) => { const r=[]; let c="",q=false; for(let i=0;i<line.length;i++){const ch=line[i]; if(ch==='"')q=!q; else if(ch===','&&!q){r.push(c.trim());c="";}else c+=ch;} r.push(c.trim()); return r; };\n  const h=pL(lines[logStart+1]).map(x=>x.toLowerCase()); const entries=[];\n  const iD=h.findIndex(x=>x.includes("data")),iO= )",border:"1px solid rgba(0,100,200,0.15)",borderRadius:8,marginBottom:16,textAlign:"center",fontFamily:"'JetBrains Mono',monospace"}}>TOTALE: <strong>{fmtN(parseFloat(form.liters)*parseFloat(form.price),2)} €</strong></div>}\n            <div style={S.fg}><label style={S.lbl}>CONTACHILOMETRI</label><input type="number" placeholder="190500" value={form.odo} onChange={e=>setForm(f=>({...f,odo:e.target.value}))} style={S.inp} inputMode="numeric"/></div>\n            <div style={S.fg}><label style={S.lbl}>CARBURANTE</label><div style={{display:"flex",gap:8}}>{FUEL_TYPES.map(ft=>(<button key={ft} style={{...S.fuelOpt,...(form.fuel===ft?{background:`${FC[ft]}12`,borderColor:FC[ft],color:FC[ft],boxShadow:`0 0 10px ${FC[ft]}15`}:{})}} onClick={()=>setForm(f=>({...f,fuel:ft}))}>{ft}</button>))}</div></div>\n            <div style={S.fg}><label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setForm(f=>({...f,full:!f.full}))}>\n              <div style={{width:20,height:20,borderRadius:4,border:`1px solid ${form.full?"#0099ff":"rgba(255,255,255,0.12)"}`,background:form.full?"rgba(0,100,200,0.15)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#0099ff",fontWeight:700}}>{form.full&&"✓"}</div>\n              <span style={{fontSize:13,color:"rgba(255,255,255,0.5)",fontFamily:"'Outfit',sans-serif"}}>Pieno completo</span>\n            </label></div>\n            <div style={S.fg}><label style={S.lbl}>NOTE</label><input type="text" placeholder="autostrada, città..." value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={S.inp}/></div>\n            <button style={S.primary} onClick={handleSubmit}>{editId?"SALVA":"REGISTRA"}</button>\n            {editId&&<button style={{...S.secondary,marginTop:8}} onClick={()=>{setEditId(null);setForm({date:new Date().toISOString().slice(0,10),liters:"",price:"",odo:"",fuel:"HVO",full:true,notes:""});}}>ANNULLA</button>}\n          </div>\n        )}\n\n        {/* ═══ LOG ═══ */}\n        {view==="log" && (\n          <div style={{animation:"slideUp 0.3s ease"}}>\n            <div style={S.secTitle}>◇ STORICO RIFORNIMENTI ({entries.length})</div>\n            {[...enriched].reverse().map(e=>(\n              <div key={e.id} style={S.hCard}>\n                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>\n                  <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:3,height:16,borderRadius:2,background:FC[e.fuelType]}}/><span style={{fontSize:8,color:FC[e.fuelType],fontFamily:"'JetBrains Mono',monospace",padding:"1px 5px",border:`1px solid ${FC[e.fuelType]}25`,borderRadius:3}}>{e.fuelType}</span><span style={{fontSize:12,fontWeight:600,color:"#fff",fontFamily:"'Outfit',sans-serif"}}>{fmtDate(e.date)}</span></div>\n                  <div style={{display:"flex",gap:2}}><button style={S.iconBtn} onClick={()=>handleEdit(e)}>✏️</button><button style={S.iconBtn} onClick={()=>handleDelete(e.id)}>🗑️</button></div>\n                </div>\n                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4}}>\n                  {[[fmtN(e.liters,1)+"L","LITRI"],[fmtN(e.pricePerLiter,3)+"€","€/L"],[fmtN(e.totalCost,2)+"€","TOT"],[e.calc?fmtN(e.calc.lPer100,1):"—","L/100"]].map(([v,l],i)=>(\n                    <div key={i} style={{textAlign:"center",padding:"4px 0"}}><div style={{fontSize:13,fontWeight:600,color:i===3&&e.calc?"#0099ff":i===3?"rgba(255,255,255,0.1)":"#fff",fontFamily:"'JetBrains Mono',monospace"}}>{v}</div><div style={{fontSize:7,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",marginTop:2}}>{l}</div></div>\n                  ))}\n                </div>\n                <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"rgba(255,255,255,0.15)",marginTop:8,paddingTop:6,borderTop:"1px solid rgba(255,255,255,0.03)",fontFamily:"'JetBrains Mono',monospace"}}>\n                  <span>ODO {e.odometer.toLocaleString("it-IT")}</span>{e.calc&&<span>↔ {e.calc.kmDriven} km</span>}{!e.fullTank&&<span style={{color:"#f0c000"}}>PARZIALE</span>}\n                </div>\n                {e.notes&&<div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:4,fontFamily:"'Outfit',sans-serif"}}>→ {e.notes}</div>}\n              </div>\n            ))}\n          </div>\n        )}\n\n        {/* ═══ STATS ═══ */}\n        {view==="stats" && (\n          <div style={{animation:"slideUp 0.3s ease"}}>\n            {entries.length < 2 ? (\n              <div style={S.empty}><div style={{fontSize:11,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace"}}>SERVONO ALMENO 2 PIENI PER LE STATISTICHE</div></div>\n            ) : (<>\n              {/* Summary cards */}\n              <div style={S.secTitle}>◇ RIEPILOGO GENERALE</div>\n              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>\n                {[\n                  [stats.n+"","RIFORN.",false],[fmtN(stats.liters,0),"LITRI",false],[fmtN(stats.km,0),"KM",false],\n                  [stats.avgL?fmtN(stats.avgL,1):"—","L/100",true],[stats.avgC?fmtN(stats.avgC,3):"—","€/KM",false],\n                  [sorted.length?sorted[sorted.length-1].odometer.toLocaleString("it-IT"):"—","ODO",false],\n                ].map(([v,l,hl],i)=>(\n                  <div key={i} style={{...S.card,textAlign:"center",...(hl?{border:"1px solid rgba(0,120,255,0.2)",background:"rgba(0,100,200,0.06)"}:{})}}>\n                    <div style={{fontSize:18,fontWeight:700,color:hl?"#0099ff":"#fff",fontFamily:"'JetBrains Mono',monospace",textShadow:hl?"0 0 10px rgba(0,153,255,0.2)":"none"}}>{v}</div>\n                    <div style={{fontSize:7,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",marginTop:4}}>{l}</div>\n                  </div>\n                ))}\n              </div>\n\n              {/* Consumption over time */}\n              {chartData.length>=2 && (<>\n                <div style={S.secTitle}>◇ CONSUMO NEL TEMPO (L/100KM)</div>\n                <div style={S.chartBox}>\n                  <ResponsiveContainer width="100%" height={180}><AreaChart data={chartData} margin={{top:5,right:10,left:-15,bottom:5}}>\n                    <defs><linearGradient id="gFS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#0099ff" stopOpacity={0.25}/><stop offset="100%" stopColor="#0099ff" stopOpacity={0}/></linearGradient></defs>\n                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,100,200,0.06)"/><XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}/><YAxis tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}} domain={["auto","auto"]}/>\n                    <Tooltip contentStyle={{background:"rgba(8,12,24,0.95)",border:"1px solid rgba(0,100,200,0.3)",borderRadius:8,fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#0099ff"}}/>\n                    <Area type="monotone" dataKey="l/100km" stroke="#0099ff" strokeWidth={2} fill="url(#gFS)" dot={{fill:"#0099ff",r:3,strokeWidth:0}} activeDot={{r:5,fill:"#0099ff",stroke:"rgba(0,153,255,0.3)",strokeWidth:4}}/>\n                  </AreaChart></ResponsiveContainer>\n                </div>\n              </>)}\n\n              {/* €/km over time */}\n              {chartData.length>=2 && (<>\n                <div style={S.secTitle}>◇ COSTO PER KM (€/KM)</div>\n                <div style={S.chartBox}>\n                  <ResponsiveContainer width="100%" height={180}><AreaChart data={chartData} margin={{top:5,right:10,left:-15,bottom:5}}>\n                    <defs><linearGradient id="cFS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#c080ff" stopOpacity={0.2}/><stop offset="100%" stopColor="#c080ff" stopOpacity={0}/></linearGradient></defs>\n                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,100,200,0.06)"/><XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}/><YAxis tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}} domain={["auto","auto"]}/>\n                    <Tooltip contentStyle={{background:"rgba(8,12,24,0.95)",border:"1px solid rgba(192,128,255,0.3)",borderRadius:8,fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#c080ff"}}/>\n                    <Area type="monotone" dataKey="€/km" stroke="#c080ff" strokeWidth={2} fill="url(#cFS)" dot={{fill:"#c080ff",r:3}} activeDot={{r:5,fill:"#c080ff",stroke:"rgba(192,128,255,0.3)",strokeWidth:4}}/>\n                  </AreaChart></ResponsiveContainer>\n                </div>\n              </>)}\n\n              {/* Monthly fuel cost */}\n              {monthlyFuel.length>=2 && (<>\n                <div style={S.secTitle}>◇ SPESA CARBURANTE MENSILE</div>\n                <div style={S.chartBox}>\n                  <ResponsiveContainer width="100%" height={180}><BarChart data={monthlyFuel} margin={{top:5,right:10,left:-15,bottom:5}}>\n                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,100,200,0.06)"/><XAxis dataKey="label" tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}/><YAxis tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}} tickFormatter={v=>"€"+v}/>\n                    <Tooltip contentStyle={{background:"rgba(8,12,24,0.95)",border:"1px solid rgba(0,200,140,0.3)",borderRadius:8,fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#00c88a"}} formatter={v=>["€ "+fmtN(v,2),"Spesa"]}/>\n                    <Bar dataKey="cost" fill="#00c88a" radius={[4,4,0,0]} fillOpacity={0.75}/>\n                  </BarChart></ResponsiveContainer>\n                </div>\n              </>)}\n\n              {/* Monthly km */}\n              {monthlyKm.length>=2 && (<>\n                <div style={S.secTitle}>◇ KM PERCORSI AL MESE</div>\n                <div style={S.chartBox}>\n                  <ResponsiveContainer width="100%" height={180}><BarChart data={monthlyKm} margin={{top:5,right:10,left:-15,bottom:5}}>\n                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,100,200,0.06)"/><XAxis dataKey="label" tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}/><YAxis tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}/>\n                    <Tooltip contentStyle={{background:"rgba(8,12,24,0.95)",border:"1px solid rgba(0,153,255,0.3)",borderRadius:8,fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#0099ff"}} formatter={v=>[v.toLocaleString("it-IT")+" km","Distanza"]}/>\n                    <Bar dataKey="km" fill="#0099ff" radius={[4,4,0,0]} fillOpacity={0.6}/>\n                  </BarChart></ResponsiveContainer>\n                </div>\n              </>)}\n\n              {/* Monthly avg consumption */}\n              {monthlyCons.length>=2 && (<>\n                <div style={S.secTitle}>◇ CONSUMO MEDIO MENSILE</div>\n                <div style={S.chartBox}>\n                  <ResponsiveContainer width="100%" height={180}><AreaChart data={monthlyCons} margin={{top:5,right:10,left:-15,bottom:5}}>\n                    <defs><linearGradient id="mCS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#f0c000" stopOpacity={0.2}/><stop offset="100%" stopColor="#f0c000" stopOpacity={0}/></linearGradient></defs>\n                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,100,200,0.06)"/><XAxis dataKey="label" tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}/><YAxis tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}} domain={["auto","auto"]}/>\n                    <Tooltip contentStyle={{background:"rgba(8,12,24,0.95)",border:"1px solid rgba(240,192,0,0.3)",borderRadius:8,fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#f0c000"}}/>\n                    <Area type="monotone" dataKey="l/100km" stroke="#f0c000" strokeWidth={2} fill="url(#mCS)" dot={{fill:"#f0c000",r:3}}/>\n                  </AreaChart></ResponsiveContainer>\n                </div>\n              </>)}\n\n              {/* B7 vs HVO comparison */}\n              {byFuel.length>=2 && (<>\n                <div style={S.secTitle}>◇ CONFRONTO B7 vs HVO</div>\n                <div style={S.chartBox}>\n                  <div style={S.chartTitle}>CONSUMO MEDIO (l/100km)</div>\n                  <ResponsiveContainer width="100%" height={140}><BarChart data={byFuel.filter(s=>s.avgL).map(s=>({name:s.type,"l/100km":+s.avgL.toFixed(2)}))} margin={{top:5,right:10,left:-15,bottom:5}}>\n                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,100,200,0.06)"/><XAxis dataKey="name" tick={{fill:"rgba(255,255,255,0.4)",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}/><YAxis tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}} domain={["auto","auto"]}/>\n                    <Tooltip contentStyle={{background:"rgba(8,12,24,0.95)",border:"1px solid rgba(0,100,200,0.3)",borderRadius:8,fontFamily:"'JetBrains Mono',monospace",color:"#0099ff"}}/>\n                    <Bar dataKey="l/100km" radius={[4,4,0,0]} fillOpacity={0.8}>\n                      {byFuel.filter(s=>s.avgL).map((s,i)=>(<rect key={i} fill={FC[s.type]}/>))}\n                    </Bar>\n                  </BarChart></ResponsiveContainer>\n                </div>\n                <div style={{display:"grid",gridTemplateColumns:`repeat(${byFuel.length},1fr)`,gap:8,marginBottom:16}}>\n                  {byFuel.map(s=>(\n                    <div key={s.type} style={{...S.hCard,borderTop:`2px solid ${FC[s.type]}`}}>\n                      <div style={{fontSize:10,color:FC[s.type],fontFamily:"'JetBrains Mono',monospace",fontWeight:700,letterSpacing:"0.1em",marginBottom:10}}>{s.type}</div>\n                      {[["Consumo",s.avgL?fmtN(s.avgL,1)+" l/100":"—"],["€/km",s.avgC?fmtN(s.avgC,3):"—"],["Pieni",""+s.count],["Litri",fmtN(s.liters,0)+" L"],["Spesa","€ "+fmtN(s.cost,0)]].map(([l,v],i)=>(\n                        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.025)"}}>\n                          <span style={{fontSize:9,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace"}}>{l}</span>\n                          <span style={{fontSize:10,fontWeight:600,color:"#fff",fontFamily:"'JetBrains Mono',monospace"}}>{v}</span>\n                        </div>\n                      ))}\n                    </div>\n                  ))}\n                </div>\n              </>)}\n\n              {/* Total cost of ownership */}\n              {costBreakdown.length>0 && (<>\n                <div style={S.secTitle}>◇ COSTO TOTALE DI POSSESSO</div>\n                <div style={S.hCard}>\n                  <div style={{textAlign:"center",marginBottom:16}}>\n                    <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",marginBottom:6}}>TOTALE</div>\n                    <div style={{fontSize:32,fontWeight:700,color:"#fff",fontFamily:"'JetBrains Mono',monospace"}}>€ {totalOwnership.toLocaleString("it-IT")}</div>\n                  </div>\n                  {costBreakdown.map((c,i)=>{\n                    const pct = totalOwnership>0 ? (c.value/totalOwnership*100) : 0;\n                    return (\n                      <div key={i} style={{marginBottom:12}}>\n                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>\n                          <span style={{fontSize:11,color:"rgba(255,255,255,0.5)",fontFamily:"'Outfit',sans-serif"}}>{c.name}</span>\n                          <span style={{fontSize:12,fontWeight:600,color:c.color,fontFamily:"'JetBrains Mono',monospace"}}>€ {c.value.toLocaleString("it-IT")} <span style={{fontSize:9,color:"rgba(255,255,255,0.25)"}}>({fmtN(pct,0)}%)</span></span>\n                        </div>\n                        <div style={{width:"100%",height:6,borderRadius:3,background:"rgba(255,255,255,0.04)",overflow:"hidden"}}>\n                          <div style={{width:pct+"%",height:"100%",borderRadius:3,background:c.color,opacity:0.7,transition:"width 0.5s ease"}}/>\n                        </div>\n                      </div>\n                    );\n                  })}\n                </div>\n              </>)}\n\n              {/* Price per liter trend */}\n              {entries.length>=3 && (<>\n                <div style={S.secTitle}>◇ PREZZO AL LITRO NEL TEMPO</div>\n                <div style={S.chartBox}>\n                  <ResponsiveContainer width="100%" height={160}><AreaChart data={[...entries].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(e=>({date:fmtDate(e.date),"€/L":+e.pricePerLiter.toFixed(3),tipo:e.fuelType}))} margin={{top:5,right:10,left:-15,bottom:5}}>\n                    <defs><linearGradient id="pLS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#ff6b6b" stopOpacity={0.15}/><stop offset="100%" stopColor="#ff6b6b" stopOpacity={0}/></linearGradient></defs>\n                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,100,200,0.06)"/><XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}/><YAxis tick={{fill:"rgba(255,255,255,0.25)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}} domain={["auto","auto"]}/>\n                    <Tooltip contentStyle={{background:"rgba(8,12,24,0.95)",border:"1px solid rgba(255,107,107,0.3)",borderRadius:8,fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#ff6b6b"}}/>\n                    <Area type="monotone" dataKey="€/L" stroke="#ff6b6b" strokeWidth={2} fill="url(#pLS)" dot={{fill:"#ff6b6b",r:2.5}}/>\n                  </AreaChart></ResponsiveContainer>\n                </div>\n              </>)}\n            </>)}\n          </div>\n        )}\n\n        {/* ═══ MAINT ═══ */}\n        {view==="maint" && (\n          <div style={{animation:"slideUp 0.3s ease"}}>\n            <div style={S.secTitle}>◇ {editMaintId?"MODIFICA SPESA":"REGISTRA SPESA"}</div>\n            <div style={{display:"flex",gap:12}}>\n              <div style={{...S.fg,flex:1}}><label style={S.lbl}>DATA</label><input type="date" value={mForm.date} onChange={e=>setMForm(f=>({...f,date:e.target.value}))} style={S.inp}/></div>\n              <div style={{...S.fg,flex:1}}><label style={S.lbl}>TIPO</label><select value={mForm.type} onChange={e=>setMForm(f=>({...f,type:e.target.value}))} style={S.inp}>{MAINT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></div>\n            </div>\n            <div style={S.fg}><label style={S.lbl}>DESCRIZIONE</label><input type="text" placeholder="Cambio olio, sostituzione filtri..." value={mForm.desc} onChange={e=>setMForm(f=>({...f,desc:e.target.value}))} style={S.inp}/></div>\n            <div style={{display:"flex",gap:12}}>\n              <div style={{...S.fg,flex:1}}><label style={S.lbl}>COSTO €</label><input type="number" step="0.01" placeholder="350.00" value={mForm.cost} onChange={e=>setMForm(f=>({...f,cost:e.target.value}))} style={S.inp} inputMode="decimal"/></div>\n              <div style={{...S.fg,flex:1}}><label style={S.lbl}>KM (OPZ.)</label><input type="number" placeholder="192000" value={mForm.odo} onChange={e=>setMForm(f=>({...f,odo:e.target.value}))} style={S.inp} inputMode="numeric"/></div>\n            </div>\n            <div style={S.fg}><label style={S.lbl}>NOTE</label><input type="text" placeholder="officina, garanzia..." value={mForm.notes} onChange={e=>setMForm(f=>({...f,notes:e.target.value}))} style={S.inp}/></div>\n            <button style={{...S.primary,background:"linear-gradient(135deg,#ff8c00,#cc6600)"}} onClick={handleMaintSubmit}>{editMaintId?"SALVA":"REGISTRA SPESA"}</button>\n            {editMaintId&&<button style={{...S.secondary,marginTop:8}} onClick={()=>{setEditMaintId(null);setMForm({date:new Date().toISOString().slice(0,10),type:"Tagliando",desc:"",cost:"",odo:"",notes:""});}}>ANNULLA</button>}\n\n            {maint.length>0 && (\n              <>\n                <div style={{...S.secTitle,marginTop:24}}>◇ STORICO SPESE ({maint.length}) · € {fmtN(totalMaintCost,0)}</div>\n                {[...maint].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(m=>(\n                  <div key={m.id} style={S.hCard}>\n                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>\n                      <div style={{display:"flex",alignItems:"center",gap:8}}>\n                        <span style={{fontSize:8,color:"#ffa832",fontFamily:"'JetBrains Mono',monospace",padding:"2px 6px",border:"1px solid rgba(255,168,50,0.2)",borderRadius:3,background:"rgba(255,168,50,0.06)"}}>{m.type.toUpperCase()}</span>\n                        <span style={{fontSize:12,fontWeight:600,color:"#fff",fontFamily:"'Outfit',sans-serif"}}>{fmtDate(m.date)}</span>\n                      </div>\n                      <div style={{display:"flex",gap:2}}><button style={S.iconBtn} onClick={()=>handleEditMaint(m)}>✏️</button><button style={S.iconBtn} onClick={()=>handleDeleteMaint(m.id)}>🗑️</button></div>\n                    </div>\n                    <div style={{fontSize:13,color:"rgba(255,255,255,0.7)",fontFamily:"'Outfit',sans-serif",marginBottom:6}}>{m.desc}</div>\n                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>\n                      <div style={{fontSize:18,fontWeight:700,color:"#ffa832",fontFamily:"'JetBrains Mono',monospace"}}>€ {fmtN(m.cost,2)}</div>\n                      {m.odometer>0&&<div style={{fontSize:9,color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace"}}>ODO {m.odometer.toLocaleString("it-IT")}</div>}\n                    </div>\n                    {m.notes&&<div style={{fontSize:10,color:"rgba(255,255,255,0.2)",marginTop:4,fontFamily:"'Outfit',sans-serif"}}>→ {m.notes}</div>}\n                  </div>\n                ))}\n              </>\n            )}\n          </div>\n        )}\n\n        {/* ═══ INFO ═══ */}\n        {view==="info" && (\n          <div style={{animation:"slideUp 0.3s ease"}}>\n            {/* Sub-tabs */}\n            <div style={{display:"flex",gap:6,marginBottom:16}}>\n              {[["veicolo","VEICOLO"],["assicurazione","ASSICURAZIONE"]].map(([id,label])=>(\n                <button key={id} style={{flex:1,padding:"10px 0",background:infoTab===id?"rgba(0,100,200,0.1)":"rgba(255,255,255,0.02)",border:`1px solid ${infoTab===id?"rgba(0,100,200,0.25)":"rgba(255,255,255,0.05)"}`,borderRadius:8,color:infoTab===id?"#0099ff":"rgba(255,255,255,0.3)",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em"}} onClick={()=>setInfoTab(id)}>{label}</button>\n              ))}\n            </div>\n\n            {infoTab==="veicolo" && (\n              <>\n                <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:24}}>\n                  <FordLogo size={90}/>\n                  <div style={{fontSize:26,fontWeight:200,color:"#c8d8ec",fontFamily:"'Outfit',sans-serif",letterSpacing:"0.32em",marginTop:14,background:"linear-gradient(90deg, #8aa0c0, #e0eaf8, #ffffff, #e0eaf8, #8aa0c0)",backgroundSize:"200% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",animation:"shimmer 6s linear infinite"}}>GALAXY</div>\n                  <div style={{fontSize:10,color:"rgba(0,160,255,0.4)",fontFamily:"'JetBrains Mono',monospace",marginTop:6,letterSpacing:"0.12em"}}>3ª SERIE // 2019</div>\n                </div>\n\n                <div style={S.secTitle}>◇ ACQUISTO</div>\n                <div style={S.hCard}>\n                  {[["Data acquisto",VEHICLE.acquisto],["Prezzo","€ "+VEHICLE.prezzoAcquisto.toLocaleString("it-IT")]].map(([l,v],i)=>(\n                    <div key={i} style={S.infoRow}><span style={S.infoLabel}>{l}</span><span style={S.infoValue}>{v}</span></div>\n                  ))}\n                </div>\n\n                <div style={S.secTitle}>◇ IDENTIFICAZIONE</div>\n                <div style={S.hCard}>\n                  {[["Targa",VEHICLE.targa],["VIN (Telaio)",VEHICLE.vin],["Immatricolazione",VEHICLE.immatricolazione],["Costruttore",VEHICLE.costruttore],["Modello",VEHICLE.modello],["Tipo",VEHICLE.tipo],["Categoria",VEHICLE.categoria],["Carrozzeria",VEHICLE.carrozzeria]].map(([l,v],i)=>(\n                    <div key={i} style={S.infoRow}><span style={S.infoLabel}>{l}</span><span style={S.infoValue}>{v}</span></div>\n                  ))}\n                </div>\n\n                <div style={S.secTitle}>◇ MOTORE E TRASMISSIONE</div>\n                <div style={S.hCard}>\n                  {[["Motore",VEHICLE.motore],["Alimentazione",VEHICLE.alimentazione],["Cilindrata",VEHICLE.cilindrata],["Potenza",VEHICLE.potenza],["Cambio",VEHICLE.cambio],["Normativa",VEHICLE.euro],["CO₂ WLTP",VEHICLE.co2],["Distribuzione",VEHICLE.distribuzione],["Intervallo BIO",VEHICLE.intervalloBIO]].map(([l,v],i)=>(\n                    <div key={i} style={S.infoRow}><span style={S.infoLabel}>{l}</span><span style={S.infoValue}>{v}</span></div>\n                  ))}\n                </div>\n\n                <div style={S.secTitle}>◇ DIMENSIONI E PESI</div>\n                <div style={S.hCard}>\n                  {[["Lunghezza",VEHICLE.lunghezza],["Larghezza",VEHICLE.larghezza],["Posti",VEHICLE.posti],["Massa totale",VEHICLE.massaTotale],["Massa a vuoto",VEHICLE.massaVuoto],["Massa traino",VEHICLE.massaTraino],["Serbatoio",VEHICLE.serbatoio]].map(([l,v],i)=>(\n                    <div key={i} style={S.infoRow}><span style={S.infoLabel}>{l}</span><span style={S.infoValue}>{v}</span></div>\n                  ))}\n                </div>\n\n                <div style={S.secTitle}>◇ PNEUMATICI AMMESSI</div>\n                <div style={S.hCard}>\n                  {[["A1",VEHICLE.pneumaticiA1],["A2",VEHICLE.pneumaticiA2],["A3 (M+S)",VEHICLE.pneumaticiA3]].map(([l,v],i)=>(\n                    <div key={i} style={S.infoRow}><span style={S.infoLabel}>{l}</span><span style={S.infoValue}>{v}</span></div>\n                  ))}\n                </div>\n\n                <div style={S.secTitle}>◇ OMOLOGAZIONE</div>\n                <div style={S.hCard}>\n                  {[["Omologazione",VEHICLE.omologazione],["REG UE",VEHICLE.regUE],["Ultima revisione",VEHICLE.ultimaRevisione]].map(([l,v],i)=>(\n                    <div key={i} style={S.infoRow}><span style={S.infoLabel}>{l}</span><span style={S.infoValue}>{v}</span></div>\n                  ))}\n                </div>\n              </>\n            )}\n\n            {infoTab==="assicurazione" && (\n              <>\n                <div style={{...S.hCard,border:"1px solid rgba(0,100,200,0.15)",background:"rgba(0,100,200,0.04)",marginBottom:16,textAlign:"center"}}>\n                  <div style={{fontSize:12,fontWeight:700,color:"#fff",fontFamily:"'Outfit',sans-serif"}}>{INSURANCE.compagnia}</div>\n                  <div style={{fontSize:9,color:"rgba(0,160,255,0.4)",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>POLIZZA N° {INSURANCE.polizza}</div>\n                  <div style={{fontSize:28,fontWeight:700,color:"#0099ff",fontFamily:"'JetBrains Mono',monospace",marginTop:12,textShadow:"0 0 12px rgba(0,153,255,0.2)"}}>€ {INSURANCE.totale.toLocaleString("it-IT",{minimumFractionDigits:2})}</div>\n                  <div style={{fontSize:8,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>PREMIO ANNUALE</div>\n                </div>\n\n                <div style={S.secTitle}>◇ CONTRATTO</div>\n                <div style={S.hCard}>\n                  {[["Agenzia",INSURANCE.agenzia],["Decorrenza",INSURANCE.decorrenza],["Scadenza",INSURANCE.scadenza],["Classe CU",INSURANCE.classeCU],["Classe VHV",INSURANCE.classeVHV],["Forma",INSURANCE.forma],["Massimale RC",INSURANCE.massimaleRC]].map(([l,v],i)=>(\n                    <div key={i} style={S.infoRow}><span style={S.infoLabel}>{l}</span><span style={S.infoValue}>{v}</span></div>\n                  ))}\n                </div>\n\n                <div style={S.secTitle}>◇ DETTAGLIO PREMIO</div>\n                <div style={S.hCard}>\n                  {[["Premio netto","€ "+INSURANCE.premioNetto.toFixed(2)],["Imposte","€ "+INSURANCE.imposte.toFixed(2)],["SSN","€ "+INSURANCE.ssn.toFixed(2)],["TOTALE","€ "+INSURANCE.totale.toFixed(2)]].map(([l,v],i)=>(\n                    <div key={i} style={{...S.infoRow,...(i===3?{borderTop:"1px solid rgba(0,100,200,0.15)",paddingTop:8,marginTop:4}:{})}}><span style={{...S.infoLabel,...(i===3?{color:"rgba(255,255,255,0.5)",fontWeight:700}:{})}}>{l}</span><span style={{...S.infoValue,...(i===3?{color:"#0099ff",fontWeight:700}:{})}}>{v}</span></div>\n                  ))}\n                </div>\n\n                <div style={S.secTitle}>◇ GARANZIE</div>\n                {INSURANCE.garanzie.map((g,i)=>(\n                  <div key={i} style={{...S.hCard,marginBottom:6,opacity:g.attiva?1:0.35,borderLeft:`2px solid ${g.attiva?"#0099ff":"rgba(255,255,255,0.1)"}`}}>\n                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>\n                      <div><div style={{fontSize:12,fontWeight:600,color:"#fff",fontFamily:"'Outfit',sans-serif"}}>{g.nome}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{g.dettaglio}</div></div>\n                      <div style={{textAlign:"right"}}>{g.attiva?<div style={{fontSize:14,fontWeight:700,color:"#0099ff",fontFamily:"'JetBrains Mono',monospace"}}>€{fmtN(g.premio,2)}</div>:<div style={{fontSize:10,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>ESCLUSA</div>}</div>\n                    </div>\n                  </div>\n                ))}\n              </>\n            )}\n          </div>\n        )}\n\n        {/* ═══ IO ═══ */}\n        {view==="io" && (\n          <div style={{animation:"slideUp 0.3s ease"}}>\n            <div style={S.secTitle}>◇ IMPORTA</div>\n            <label style={S.ioCard}><input type="file" accept=".csv" onChange={handleImportFuelio} style={{display:"none"}}/>\n              <div style={{fontSize:20,color:"#0099ff"}}>📱</div><div style={{flex:1}}><div style={S.ioTitle}>IMPORTA DA FUELIO</div><div style={S.ioDesc}>CSV esportato da Fuelio. Scrivi "HVO" o "Mix" nelle note per il tipo.</div></div>\n            </label>\n            <label style={S.ioCard}><input type="file" accept=".json" onChange={handleImportJSON} style={{display:"none"}}/>\n              <div style={{fontSize:20,color:"#c080ff"}}>📥</div><div style={{flex:1}}><div style={S.ioTitle}>RIPRISTINA BACKUP</div><div style={S.ioDesc}>Backup JSON (include rifornimenti e spese manutenzione).</div></div>\n            </label>\n            <div style={{...S.secTitle,marginTop:24}}>◇ ESPORTA</div>\n            {entries.length===0?<div style={{fontSize:10,color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace"}}>NESSUN DATO</div>:(\n              <>\n                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>\n                  {[["📄","CSV","Excel",()=>exportCSV(entries)],["📱","FUELIO","CSV",()=>exportFuelio(entries)],["💾","JSON","Backup",()=>exportJSON(entries,maint)]].map(([i,t,d,fn],idx)=>(\n                    <button key={idx} style={S.ioBtn} onClick={fn}><div style={{fontSize:20,marginBottom:4}}>{i}</div><div style={{fontSize:10,fontWeight:700,color:"#fff"}}>{t}</div><div style={{fontSize:8,color:"rgba(255,255,255,0.2)",marginTop:2}}>{d}</div></button>\n                  ))}\n                </div>\n                <div style={{...S.secTitle,marginTop:24}}>◇ SISTEMA</div>\n                <div style={S.hCard}>\n                  <div style={{fontSize:10,color:"rgba(0,153,255,0.4)",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>{entries.length} RIFORNIMENTI · {maint.length} SPESE</div>\n                  <div style={{fontSize:10,color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace",marginBottom:12}}>FUEL € {fmtN(stats.cost,0)} + MAINT € {fmtN(totalMaintCost,0)} = € {fmtN(stats.cost+totalMaintCost,0)}</div>\n                  <button style={S.danger} onClick={handleReset}>⚠ CANCELLA TUTTI I DATI</button>\n                </div>\n              </>\n            )}\n          </div>\n        )}\n\n      </div>\n    </div>\n  );\n}\n\nconst S = {\n  root:{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"linear-gradient(180deg,#050a18,#0a0f1e)",color:"#e5e5e5",fontFamily:"'Outfit',sans-serif",position:"relative",paddingBottom:80},\n  toast:{position:"fixed",top:12,left:"50%",transform:"translateX(-50%)",padding:"10px 20px",borderRadius:8,color:"#fff",fontSize:12,fontWeight:700,zIndex:100,maxWidth:400,textAlign:"center",fontFamily:"'JetBrains Mono',monospace"},\n  header:{display:"flex",justifyContent:"center",padding:"16px 20px 12px",borderBottom:"1px solid rgba(0,80,180,0.1)",position:"relative",zIndex:1},\n  nav:{display:"flex",justifyContent:"space-around",padding:"8px 4px 6px",borderBottom:"1px solid rgba(0,80,180,0.08)",background:"rgba(0,20,60,0.3)",position:"relative",zIndex:1},\n  navBtn:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:"none",border:"none",color:"rgba(180,200,230,0.45)",cursor:"pointer",padding:"8px 8px 6px",borderRadius:10,transition:"all 0.25s"},\n  navAct:{color:"#2dabff",background:"rgba(0,120,255,0.1)",boxShadow:"0 0 14px rgba(0,120,255,0.1)"},\n  content:{padding:"16px 20px",position:"relative",zIndex:1},\n  grid4:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14},\n  card:{background:"rgba(255,255,255,0.02)",borderRadius:10,padding:"13px 15px",border:"1px solid rgba(255,255,255,0.04)"},\n  chartBox:{background:"rgba(0,60,140,0.03)",borderRadius:10,padding:"14px 10px",border:"1px solid rgba(0,80,180,0.08)",marginBottom:14},\n  chartTitle:{fontSize:9,fontWeight:600,color:"rgba(0,153,255,0.4)",marginBottom:12,paddingLeft:4,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.12em"},\n  secTitle:{fontSize:9,fontWeight:600,color:"rgba(0,153,255,0.35)",marginBottom:12,marginTop:8,letterSpacing:"0.15em",fontFamily:"'JetBrains Mono',monospace"},\n  row:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"rgba(255,255,255,0.015)",borderRadius:10,marginBottom:6,border:"1px solid rgba(255,255,255,0.03)",cursor:"pointer"},\n  empty:{textAlign:"center",padding:"40px 20px"},\n  hCard:{background:"rgba(255,255,255,0.02)",borderRadius:10,padding:14,border:"1px solid rgba(255,255,255,0.04)",marginBottom:8},\n  iconBtn:{background:"none",border:"none",cursor:"pointer",fontSize:13,padding:"3px 5px",borderRadius:4,opacity:0.4},\n  fg:{marginBottom:16},\n  lbl:{display:"block",fontSize:8,color:"rgba(0,153,255,0.35)",marginBottom:7,fontWeight:600,letterSpacing:"0.15em",fontFamily:"'JetBrains Mono',monospace"},\n  inp:{width:"100%",padding:"11px 13px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,color:"#fff",fontSize:15,fontFamily:"'JetBrains Mono',monospace",outline:"none",boxSizing:"border-box",transition:"all 0.2s"},\n  fuelOpt:{flex:1,padding:"10px 0",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,color:"rgba(255,255,255,0.3)",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",transition:"all 0.2s"},\n  primary:{width:"100%",padding:"13px 0",background:"linear-gradient(135deg,#0066cc,#0099ff)",border:"none",borderRadius:10,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",marginTop:8,boxShadow:"0 0 16px rgba(0,100,200,0.2)"},\n  secondary:{width:"100%",padding:"11px 0",background:"transparent",border:"1px solid rgba(0,100,200,0.2)",borderRadius:10,color:"#0099ff",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"},\n  danger:{width:"100%",padding:"11px 0",background:"rgba(255,50,80,0.06)",border:"1px solid rgba(255,50,80,0.15)",borderRadius:8,color:"#ff3250",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"},\n  link:{background:"none",border:"none",color:"#0099ff",cursor:"pointer",fontSize:10,fontWeight:600,padding:"8px 0",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em"},\n  ioCard:{display:"flex",alignItems:"flex-start",gap:14,padding:14,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,cursor:"pointer",marginBottom:8,width:"100%",boxSizing:"border-box",textAlign:"left"},\n  ioBtn:{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:14,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,cursor:"pointer",textAlign:"center",fontFamily:"'Outfit',sans-serif"},\n  ioTitle:{fontSize:13,fontWeight:700,color:"#fff",fontFamily:"'Outfit',sans-serif",marginBottom:3},\n  ioDesc:{fontSize:10,color:"rgba(255,255,255,0.25)",lineHeight:1.4,fontFamily:"'Outfit',sans-serif"},\n  // Info rows\n  infoRow:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.025)",alignItems:"flex-start",gap:12},\n  infoLabel:{fontSize:11,color:"rgba(255,255,255,0.3)",fontFamily:"'Outfit',sans-serif",flexShrink:0},\n  infoValue:{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.8)",fontFamily:"'JetBrains Mono',monospace",textAlign:"right",wordBreak:"break-all"},\n};\n
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
