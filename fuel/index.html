<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fuel Tracker · Ford Galaxy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050a18; color: #e5e5e5; font-family: sans-serif; }
    #root { min-height: 100vh; }
    #loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px; color: rgba(0,160,255,0.5);
      font-family: monospace; font-size: 12px; letter-spacing: 0.15em;
    }
  </style>

  <!-- Import map: risolve i bare imports di React, recharts, lucide-react -->
  <script type="importmap">
  {
    "imports": {
      "react":              "https://esm.sh/react@18.3.1",
      "react/jsx-runtime":  "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom":          "https://esm.sh/react-dom@18.3.1",
      "react-dom/client":   "https://esm.sh/react-dom@18.3.1/client",
      "recharts":           "https://esm.sh/recharts@2.12.7",
      "lucide-react":       "https://esm.sh/lucide-react@0.462.0"
    }
  }
  </script>

  <!-- Babel Standalone: trasforma JSX nel browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- window.storage polyfill: mappa l'API custom su localStorage -->
  <script>
    window.storage = {
      get: function(key) {
        var val = localStorage.getItem(key);
        return Promise.resolve(val !== null ? { value: val } : null);
      },
      set: function(key, value) {
        localStorage.setItem(key, value);
        return Promise.resolve();
      }
    };
  </script>
</head>
<body>
  <div id="loading">LOADING...</div>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import App from './fuel-tracker.jsx';
    import { createRoot } from 'react-dom/client';

    document.getElementById('loading').style.display = 'none';
    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
